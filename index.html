<style>
  html, body { background: #F5F1E8; }
  html.dark, html.dark body { background: #0A0A0B; }
  body {
    font-family: 'Geist', system-ui, sans-serif;
    color: #0A0A0B;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  html.dark body { color: #F5F1E8; }

  .font-display { font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-stretch: 100%; }
  .font-display-wide { font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-stretch: 125%; }
  .font-display-narrow { font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-stretch: 75%; }

  /* Grain texture overlay */
  .grain::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    z-index: 1; opacity: .04; mix-blend-mode: multiply;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  html.dark .grain::before { opacity: .025; mix-blend-mode: overlay; }

  /* Marquee */
  @keyframes scroll-x {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .marquee { animation: scroll-x 40s linear infinite; }

  /* Pulse dot */
  @keyframes ping-pulse {
    0%   { transform: scale(1); opacity: .8; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  .pulse-dot::after {
    content: ''; position: absolute; inset: 0; border-radius: 9999px;
    background: currentColor; animation: ping-pulse 1.6s cubic-bezier(0,0,.2,1) infinite;
  }

  /* Fade up on mount */
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .fade-up { animation: fadeUp .35s cubic-bezier(.22,1,.36,1) both; }

  /* Counter shimmer */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Hero gradient blob */
  .blob {
    position: absolute; border-radius: 9999px; filter: blur(80px); pointer-events: none;
    opacity: .55; z-index: 0;
  }

  /* Range slider */
  input[type=range] { -webkit-appearance: none; height: 4px; background: rgba(10,10,11,.1); border-radius: 9999px; }
  html.dark input[type=range] { background: rgba(245,241,232,.15); }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:14px; height:14px; border-radius:9999px; background:#0A0A0B; cursor:pointer; }
  html.dark input[type=range]::-webkit-slider-thumb { background: #D6FF3E; }

  /* Hide scrollbar */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  /* Custom checkbox/toggle */
  .switch { width: 36px; height: 20px; background: rgba(10,10,11,.15); border-radius: 9999px; position: relative; transition: background .2s; }
  .switch.on { background: #0A0A0B; }
  html.dark .switch.on { background: #D6FF3E; }
  .switch-knob { width: 14px; height: 14px; background: white; border-radius: 9999px; position: absolute; top: 3px; left: 3px; transition: transform .2s; }
  .switch.on .switch-knob { transform: translateX(16px); }
  html.dark .switch.on .switch-knob { background: #0A0A0B; }

  /* Density */
  .density-compact .stat-card { padding: 14px !important; }
  .density-compact .card { padding: 14px !important; }
  .density-compact .row-pad { padding: 10px 12px !important; }

  /* SVG sparkline */
  .spark-line { fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* Underlines + dotted */
  @keyframes spin { to { transform: rotate(360deg); } }
  .animate-spin { animation: spin 0.8s linear infinite; }

  .u-dot { background-image: radial-gradient(currentColor 1px, transparent 1px); background-size: 6px 6px; background-position: 0 100%; background-repeat: repeat-x; padding-bottom: 6px; }
</style>

<!-- React + Babel -->
<!-- React dev builds — slower to parse than production but they show full
     error messages in the console when components throw, which has saved
     us multiple times during silent-mount issues.

     Babel must load AFTER React (no async, no defer) — Babel-standalone
     auto-compiles text/babel scripts as soon as it loads, and those
     compiled outputs reference React.createElement. If Babel loads first,
     the compiled scripts fail with "React is not defined" silently. -->
<script crossorigin="anonymous" src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        onload="window.__pulse_loaded_react = true"
        onerror="window.__pulse_failed_react = this.src"></script>
<script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        onload="window.__pulse_loaded_reactDom = true"
        onerror="window.__pulse_failed_reactDom = this.src"></script>
<script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        onload="window.__pulse_loaded_babel = true"
        onerror="window.__pulse_failed_babel = this.src"></script>

<style>
  /* Splash overlay — painted by the browser before React/Babel finish
     loading, then dismissed once the SPA has real data. Sits OUTSIDE
     #root so React's mount doesn't touch it; we control its lifecycle
     by toggling `data-ready` on <html>. Background is the same paper /
     ink color as the body so the seam between splash → app is invisible.

     The blur is a backdrop-filter, which means once the app starts
     rendering behind the splash, it dims and softens — the loader feels
     intentional ("Loading your intelligence") rather than accidental
     (blank screen with Babel compiling). */
  #pulse-splash {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(245, 241, 232, 0.85);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    z-index: 9999;
    transition: opacity 320ms cubic-bezier(.22,1,.36,1);
    will-change: opacity;
  }
  html.dark #pulse-splash {
    background: rgba(10, 10, 11, 0.88);
  }
  html[data-ready="1"] #pulse-splash {
    opacity: 0;
    pointer-events: none;
  }
  #pulse-splash-inner {
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    text-align: center;
  }
  #pulse-splash-logo {
    font-family: 'Bricolage Grotesque', system-ui, sans-serif;
    font-size: 32px; font-weight: 700;
    letter-spacing: -0.04em;
    color: #0A0A0B;
  }
  html.dark #pulse-splash-logo { color: #F5F1E8; }
  #pulse-splash-spinner {
    width: 28px; height: 28px;
    border: 2.5px solid rgba(10,10,11,0.12);
    border-top-color: #6B5BFF;
    border-radius: 9999px;
    animation: pulse-splash-spin 0.8s linear infinite;
  }
  html.dark #pulse-splash-spinner {
    border-color: rgba(245,241,232,0.12);
    border-top-color: #6B5BFF;
  }
  #pulse-splash-status {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(10,10,11,0.55);
  }
  html.dark #pulse-splash-status { color: rgba(245,241,232,0.55); }
  /* Reset link — appears after 3 seconds so users have a visible escape
     hatch if the loader stalls. Hidden by default; the inline script
     toggles its display after the timeout. */
  #pulse-splash-reset {
    margin-top: 14px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: #6B5BFF;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    display: none;
    opacity: 0.85;
  }
  #pulse-splash-reset:hover { opacity: 1; }
  @keyframes pulse-splash-spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="grain">
<div id="root"></div>
<div id="pulse-splash" aria-live="polite" aria-busy="true">
  <div id="pulse-splash-inner">
    <div id="pulse-splash-logo">pulse.</div>
    <div id="pulse-splash-spinner"></div>
    <div id="pulse-splash-status">Loading your intelligence</div>
    <button id="pulse-splash-reset" type="button" onclick="try{localStorage.clear();sessionStorage.clear();}catch(e){}location.reload()">Taking too long? Reset session</button>
  </div>
</div>
<script>
  // Apply the saved theme to <html> immediately so the splash matches the
  // user's dark/light preference on first paint (otherwise dark-mode users
  // see a flash of paper-colored splash before the React effect runs).
  (function () {
    try {
      var t = localStorage.getItem('pulse_theme');
      if (t === 'dark') document.documentElement.classList.add('dark');
    } catch (_) {}
  })();

  // Pre-React fail-safe: if anything goes wrong with React / Babel / the
  // network in a way that prevents the in-app dismiss effect from running,
  // force the splash to dismiss after 6 seconds AND show whatever error
  // info we have collected inside the splash itself so the user isn't
  // staring at a blank screen wondering what happened.
  var __pulse_errors = [];
  window.addEventListener('error', function (e) {
    __pulse_errors.push((e.message || 'error') + (e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : ''));
  });
  window.addEventListener('unhandledrejection', function (e) {
    __pulse_errors.push('promise: ' + (e.reason?.message || String(e.reason)));
  });
  // Build the diagnostic panel that takes over the splash when React fails
  // to mount. Errors stay selectable; nothing dismisses on accidental clicks.
  function pulseRenderDiagnostic() {
    var splash = document.getElementById('pulse-splash');
    if (!splash) return;
    // Force splash to stay visible and become interactive even if data-ready
    // got set earlier by some other code path.
    splash.style.opacity = '1';
    splash.style.pointerEvents = 'auto';
    document.documentElement.removeAttribute('data-ready');

    // Build a load-state report so we know which CDN scripts made it.
    var loadState = [
      'React:    ' + (window.React ? '✓ loaded' : (window.__pulse_loaded_react ? '⚠ tag loaded but no global' : (window.__pulse_failed_react ? '✗ failed to load (' + window.__pulse_failed_react + ')' : '— never started'))),
      'ReactDOM: ' + (window.ReactDOM ? '✓ loaded' : (window.__pulse_loaded_reactDom ? '⚠ tag loaded but no global' : (window.__pulse_failed_reactDom ? '✗ failed to load' : '— never started'))),
      'Babel:    ' + (window.Babel ? '✓ loaded' : (window.__pulse_loaded_babel ? '⚠ tag loaded but no global' : (window.__pulse_failed_babel ? '✗ failed to load' : '— never started'))),
      'UA:       ' + (navigator.userAgent || '').slice(0, 90),
    ].join('\n');

    var details = (__pulse_errors.length
      ? __pulse_errors.slice(0, 5).map(function (s) { return s.slice(0, 200); }).join('\n') + '\n\n'
      : '') + 'Load state:\n' + loadState;
    var safeDetails = details.replace(/[<>&]/g, function (c) {
      return { '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c];
    });

    var inner = document.getElementById('pulse-splash-inner');
    if (!inner) return;
    inner.innerHTML =
      '<div id="pulse-splash-logo">Couldn\'t start Pulse</div>' +
      '<pre id="pulse-diag-errors" style="font-family:Geist Mono,ui-monospace,monospace;font-size:11px;color:rgba(10,10,11,0.7);max-width:560px;max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-word;text-align:left;padding:12px;margin:0;background:rgba(10,10,11,0.04);border-radius:10px;user-select:text;-webkit-user-select:text;">' + safeDetails + '</pre>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px;">' +
        '<button type="button" id="pulse-diag-copy" style="padding:9px 14px;border-radius:10px;background:#6B5BFF;color:#fff;border:none;font-family:Geist,system-ui,sans-serif;font-size:13px;cursor:pointer;">Copy errors</button>' +
        '<button type="button" id="pulse-diag-reset" style="padding:9px 14px;border-radius:10px;background:#0A0A0B;color:#F5F1E8;border:none;font-family:Geist,system-ui,sans-serif;font-size:13px;cursor:pointer;">Reset & retry</button>' +
      '</div>';

    var copyBtn = document.getElementById('pulse-diag-copy');
    if (copyBtn) {
      copyBtn.addEventListener('click', function () {
        var t = document.getElementById('pulse-diag-errors');
        var txt = t ? t.innerText : details;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(txt).then(function () {
            copyBtn.textContent = 'Copied ✓';
          }).catch(function () {
            copyBtn.textContent = 'Copy failed';
          });
        } else {
          // Fallback for clipboard-API-less environments: select the text.
          var range = document.createRange();
          range.selectNodeContents(t);
          var sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          copyBtn.textContent = 'Selected — Cmd/Ctrl+C';
        }
      });
    }
    var resetBtn = document.getElementById('pulse-diag-reset');
    if (resetBtn) {
      resetBtn.addEventListener('click', function () {
        try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
        location.reload();
      });
    }
  }
  // Expose for manual recovery from the console too.
  window.__pulseDiagnose = pulseRenderDiagnostic;

  setTimeout(function () {
    var root = document.getElementById('root');
    var mounted = root && root.children.length > 0;
    if (mounted) return;
    pulseRenderDiagnostic();
  }, 6000);

  // Reveal the "Reset session" link on the splash after 3 seconds so the
  // user has a visible escape if React stalls. Hidden during the normal
  // (sub-1-second) loading window so the loader doesn't feel broken.
  setTimeout(function () {
    var btn = document.getElementById('pulse-splash-reset');
    if (btn) btn.style.display = 'inline-block';
  }, 3000);

  // Removed the double-click force-dismiss escape — it conflicted with the
  // user trying to select error text in the diagnostic panel. The Reset
  // button + the 6s pre-React fallback cover the same need without the
  // collision.
</script>

<script type="text/babel">
// Pulse UI primitives

const cls = (...a) => a.filter(Boolean).join(' ');

// Card wrapper — bordered, paper
const Card = ({ children, className = '', as: As = 'div', ...rest }) => (
  <As className={cls('card bg-chalk dark:bg-coalsoft border border-line dark:border-lineDark rounded-2xl p-5', className)} {...rest}>
    {children}
  </As>
);

// Primary button
const Btn = ({ children, variant = 'ink', size = 'md', className = '', as: As = 'button', ...rest }) => {
  const sizes = { sm: 'h-9 px-3.5 text-[13px]', md: 'h-11 px-5 text-sm', lg: 'h-12 px-6 text-[15px]' };
  const variants = {
    ink: 'bg-ink text-paper hover:bg-coal dark:bg-paper dark:text-ink dark:hover:bg-chalk',
    lime: 'bg-lime text-ink hover:bg-limeDeep',
    ghost: 'bg-transparent text-ink dark:text-paper hover:bg-ink/5 dark:hover:bg-paper/5',
    outline: 'bg-transparent border border-ink/15 dark:border-paper/15 text-ink dark:text-paper hover:border-ink/40 dark:hover:border-paper/40',
    magenta: 'bg-magenta text-white hover:brightness-110'
  };
  return (
    <As className={cls('inline-flex items-center justify-center gap-2 rounded-full font-medium transition-all', sizes[size], variants[variant], className)} {...rest}>
      {children}
    </As>
  );
};

// Eyebrow label — bold caps, mono
const Eyebrow = ({ children, color = 'text-ultra', className = '' }) => (
  <span className={cls('font-mono text-[10px] uppercase tracking-[0.18em] font-medium', color, className)}>{children}</span>
);

// Platform icon ref
const Plat = ({ p, className = 'w-5 h-5' }) => (
  <svg className={className}><use href={`#ic-${p}`} /></svg>
);

// Sparkline
const Sparkline = ({ data, color = 'currentColor', width = 90, height = 32 }) => {
  if (!data?.length) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline className="spark-line" points={pts} stroke={color} />
    </svg>
  );
};

// Bar sparkline (stat card variant)
const BarSpark = ({ data, color = '#6B5BFF', highlightIdx = -1, height = 28 }) => {
  const max = Math.max(...data) || 1;
  return (
    <div className="flex items-end gap-0.5" style={{ height }}>
      {data.map((v, i) => (
        <div key={i}
          className="flex-1 rounded-sm transition-all"
          style={{ height: `${(v / max) * 100}%`, background: i === highlightIdx ? color : `${color}33`, minHeight: 2 }} />
      ))}
    </div>
  );
};

// Pill badge
const Pill = ({ children, color = 'ink', className = '' }) => {
  const colors = {
    ink: 'bg-ink/8 text-ink dark:bg-paper/10 dark:text-paper',
    lime: 'bg-lime text-ink',
    magenta: 'bg-magenta text-white',
    magentaSoft: 'bg-magentaSoft text-magenta dark:bg-magenta/20 dark:text-magenta',
    ultra: 'bg-ultra text-white',
    ultraSoft: 'bg-ultraSoft text-ultra dark:bg-ultra/20 dark:text-ultra',
    paper: 'bg-paper text-ink dark:bg-paper/10 dark:text-paper',
    amber: 'bg-amber/20 text-amber'
  };
  return <span className={cls('inline-flex items-center gap-1.5 px-2.5 h-6 rounded-full text-[11px] font-medium tracking-tight whitespace-nowrap', colors[color], className)}>{children}</span>;
};

// Pulse live dot
const PulseDot = ({ color = 'bg-magenta', size = 'w-2 h-2' }) => (
  <span className={cls('relative inline-block rounded-full pulse-dot', size, color)} style={{ color: undefined }} />
);

// Progress bar
const Progress = ({ value, max = 100, color = 'bg-ultra', height = 'h-1.5', animate = true }) => {
  const [w, setW] = React.useState(0);
  React.useEffect(() => { const t = setTimeout(() => setW((value / max) * 100), 100); return () => clearTimeout(t); }, [value, max]);
  return (
    <div className={cls('w-full rounded-full bg-ink/8 dark:bg-paper/10 overflow-hidden', height)}>
      <div className={cls('h-full rounded-full transition-all duration-[1200ms] ease-out', color)} style={{ width: `${animate ? w : (value / max) * 100}%` }} />
    </div>
  );
};

// Stat card — label, value, delta, sparkline
const StatCard = ({ label, value, delta, deltaPositive = true, sparkData, color = '#6B5BFF', icon }) => (
  <div className="stat-card card bg-chalk dark:bg-coalsoft border border-line dark:border-lineDark rounded-2xl p-5 hover:border-ink/20 dark:hover:border-paper/20 transition-all">
    <div className="flex items-start justify-between mb-3">
      <div className="flex items-center gap-2">
        {icon && <div className="w-7 h-7 rounded-lg bg-ink/5 dark:bg-paper/5 flex items-center justify-center"><Icon name={icon} className="w-3.5 h-3.5" /></div>}
        <span className="font-mono text-[10px] uppercase tracking-[0.14em] text-mute dark:text-muteDark">{label}</span>
      </div>
      {delta !== undefined && (
        <span className={cls('font-mono text-[11px] flex items-center gap-0.5', deltaPositive ? 'text-emerald-600 dark:text-lime' : 'text-magenta')}>
          {deltaPositive ? '↑' : '↓'} {Math.abs(delta)}%
        </span>
      )}
    </div>
    <div className="font-display text-[34px] leading-none font-semibold tracking-tighter mb-3">{value}</div>
    {sparkData && <BarSpark data={sparkData} color={color} highlightIdx={sparkData.length - 2} />}
  </div>
);

// Section header
const SectionHead = ({ eyebrow, title, sub, right, className = '' }) => (
  <div className={cls('flex flex-col sm:flex-row sm:items-end justify-between gap-3 mb-5', className)}>
    <div>
      {eyebrow && <div className="mb-2"><Eyebrow>{eyebrow}</Eyebrow></div>}
      <h2 className="font-display text-[22px] sm:text-[26px] leading-none font-semibold tracking-tighter">{title}</h2>
      {sub && <p className="text-[13px] text-mute dark:text-muteDark mt-1.5 max-w-md">{sub}</p>}
    </div>
    {right}
  </div>
);

// Logo
const PulseLogo = ({ className = 'h-7' }) => (
  <div className={cls('inline-flex items-center gap-2', className)}>
    <svg viewBox="0 0 32 32" className="h-full w-auto" fill="none">
      <circle cx="16" cy="16" r="14" stroke="currentColor" strokeWidth="1.5" opacity="0.2" />
      <path d="M4 16h6l2-6 4 14 2-8 2 4h8" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
    <span className="font-display text-[20px] font-bold tracking-tightest">Pulse</span>
  </div>
);

Object.assign(window, { cls, Card, Btn, Eyebrow, Plat, Sparkline, BarSpark, Pill, PulseDot, Progress, StatCard, SectionHead, PulseLogo });

</script>

    box-shadow:0 0 0 .5px rgba(0,0,0,.18),0 4px 10px rgba(0,0,0,.12)}

    0 2px 6px rgba(0,0,0,.15)}

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

  .twk-chip>span>i:first-child{box-shadow:none}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}
`;

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

<script type="text/babel">
// Pulse Auth + Onboarding — wired to Supabase
// Magic link + email/password. JWT stored in window.__pulseToken on success.

const SUPABASE_URL  = 'https://gyiiccstlrgzfbwgtuww.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd5aWljY3N0bHJnemZid2d0dXd3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1MTcyOTEsImV4cCI6MjA5NDA5MzI5MX0.mC7iQ73NhSsER1c22zT63ntRXwsVLwq6Pv-oRv15kDA';

// ── Lightweight Supabase auth client (no SDK needed) ─────────────────────────
const sbAuth = {
  headers: () => ({
    'Content-Type':  'application/json',
    'apikey':        SUPABASE_ANON,
    'Authorization': `Bearer ${SUPABASE_ANON}`
  }),

  // Magic link (OTP)
  signInWithOtp: async (email) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/otp`, {
      method: 'POST',
      headers: sbAuth.headers(),
      body: JSON.stringify({ email, create_user: true, options: { emailRedirectTo: window.location.origin } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Could not send link');
    return data;
  },

  // Email + password sign up
  signUp: async (email, password) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: sbAuth.headers(),
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Sign up failed');
    return data;
  },

  // Email + password sign in
  signIn: async (email, password) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: sbAuth.headers(),
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Sign in failed');
    return data; // { access_token, refresh_token, user }
  },

  // Verify OTP token from magic link hash
  verifyOtp: async (token, email) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/verify`, {
      method: 'POST',
      headers: sbAuth.headers(),
      body: JSON.stringify({ type: 'magiclink', token, email })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || 'Verification failed');
    return data;
  },

  // Update the current user's metadata (e.g. first name). Goes through
  // Supabase Auth's PUT /user endpoint with the user's own access token —
  // the service role is not involved on the client side.
  updateUser: async (accessToken, patch) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        ...sbAuth.headers(),
        'Authorization': `Bearer ${accessToken}`,
      },
      body: JSON.stringify(patch),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Update failed');
    return data; // updated user
  },

  // Exchange a refresh_token for a fresh access_token. Supabase access tokens
  // expire after 1 hour; without this, anyone who left the tab open and came
  // back gets logged out.
  refresh: async (refreshToken) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: sbAuth.headers(),
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Token refresh failed');
    return data; // { access_token, refresh_token (new), expires_in, user }
  },

  // Get session from localStorage
  getSession: () => {
    try {
      const raw = localStorage.getItem('pulse_session');
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  },

  // Save session
  saveSession: (session) => {
    localStorage.setItem('pulse_session', JSON.stringify(session));
    window.__pulseToken = session.access_token;
  },

  // Clear session
  clearSession: () => {
    localStorage.removeItem('pulse_session');
    window.__pulseToken = null;
  }
};

// ── Check for magic link token in URL hash on load ────────────────────────────
const checkMagicLinkHash = async (onAuthed) => {
  const hash = window.location.hash;
  if (!hash.includes('access_token')) return false;

  try {
    const params = new URLSearchParams(hash.replace('#', ''));
    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if (!accessToken) return false;

    // Get user from token
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: {
        'apikey':        SUPABASE_ANON,
        'Authorization': `Bearer ${accessToken}`
      }
    });
    const user = await res.json();

    const session = { access_token: accessToken, refresh_token: refreshToken, user };
    sbAuth.saveSession(session);

    // Clean URL
    window.history.replaceState({}, document.title, window.location.pathname);
    onAuthed(session);
    return true;
  } catch (e) {
    console.error('Magic link verification failed:', e);
    return false;
  }
};

// ── Session restore on app load ───────────────────────────────────────────────
// Verifies the saved access_token still works. If it's expired (very likely
// after >1 hour idle), exchanges the refresh_token for a fresh access_token
// before giving up. Only clears the session if the refresh also fails.
const restoreSession = (onAuthed) => {
  const session = sbAuth.getSession();
  if (!session?.access_token) return false;

  window.__pulseToken = session.access_token;

  fetch(`${SUPABASE_URL}/auth/v1/user`, {
    headers: {
      'apikey':        SUPABASE_ANON,
      'Authorization': `Bearer ${session.access_token}`
    }
  }).then(async r => {
    if (r.ok) {
      // Refresh user object too so user.created_at and metadata are current
      const user = await r.json().catch(() => session.user);
      onAuthed({ ...session, user });
      return;
    }
    // Token rejected — try to refresh before clearing.
    if (session.refresh_token) {
      try {
        const refreshed = await sbAuth.refresh(session.refresh_token);
        sbAuth.saveSession(refreshed);
        onAuthed(refreshed);
        return;
      } catch (e) {
        // Refresh failed too — session is genuinely dead.
      }
    }
    sbAuth.clearSession();
  }).catch(async () => {
    // Network error reaching Supabase /user. Don't nuke the session for a
    // transient failure — keep it and let the next call retry. We do still
    // signal "authed" with the cached session so the UI shows the app, not the
    // landing page, during a flaky connection.
    onAuthed(session);
  });

  return true;
};

// Export for use in app.jsx
Object.assign(window, { sbAuth, checkMagicLinkHash, restoreSession });

                <label className="block text-[12px] font-medium mb-2 text-mute dark:text-muteDark">How long have you been active on social?</label>
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                  {[
                    { id: 'under-6mo', label: 'Under 6 mo' },
                    { id: '6-12mo',    label: '6 – 12 mo' },
                    { id: '1-3yr',     label: '1 – 3 yrs' },

                    <button
                      key={a.id}
                      onClick={() => setAccountAge(a.id)}
                      className={cls(
                        'h-10 rounded-xl border text-[13px] font-medium transition',
                        accountAge === a.id
                          ? 'bg-ink text-paper border-ink dark:bg-paper dark:text-ink'
                          : 'border-line dark:border-lineDark hover:border-ink/30'
                      )}
                    >
                      {a.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Step 1 — Country + focus regions */}
        {step === 1 && (
          <div className="fade-up">
            <Eyebrow color="text-ultra">Where</Eyebrow>
            <h1 className="font-display text-[40px] sm:text-[52px] leading-[1] font-semibold tracking-tightest mt-3 mb-3">
              Your country & focus.
            </h1>
            <p className="text-[15px] text-mute dark:text-muteDark mb-8">
              Where you operate, and the regions you want to compare against. We use this to prioritise platforms (e.g. Snapchat for the Gulf, YouTube in Pakistan) and surface competitor signals.
            </p>

            <div className="space-y-6">
              <div>
                <label className="block text-[12px] font-medium mb-1.5 text-mute dark:text-muteDark">Your country</label>
                <select
                  value={country}
                  onChange={e => setCountry(e.target.value)}
                  className="w-full h-11 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[14px] focus:outline-none focus:border-ultra transition appearance-none"
                >
                  {COUNTRIES.map(([id, label]) => (
                    <option key={id} value={id}>{label}</option>
                  ))}
                </select>
              </div>

              <div>
                <label className="block text-[12px] font-medium mb-2 text-mute dark:text-muteDark">
                  Focus regions <span className="text-[11px] text-mute dark:text-muteDark">— who you want to compare against</span>
                </label>

                <div className="text-[10px] font-mono uppercase tracking-[0.14em] text-mute dark:text-muteDark mb-1.5">Regions</div>
                <div className="flex flex-wrap gap-1.5 mb-4">

                    <button
                      key={id}
                      onClick={() => toggleFocus(id)}
                      className={cls(
                        'h-8 px-3 rounded-full text-[12.5px] font-medium border transition',
                        focusRegions.includes(id)
                          ? 'bg-ink text-paper border-ink dark:bg-paper dark:text-ink dark:border-paper'
                          : 'border-line dark:border-lineDark hover:border-ink/30'
                      )}
                    >
                      {label}
                    </button>
                  ))}
                </div>

                <div className="text-[10px] font-mono uppercase tracking-[0.14em] text-mute dark:text-muteDark mb-1.5">Specific countries</div>
                <div className="flex flex-wrap gap-1.5 max-h-40 overflow-y-auto pr-1">
                  {COUNTRIES.filter(([id]) => id !== 'GLOBAL').map(([id, label]) => (
                    <button
                      key={id}
                      onClick={() => toggleFocus(id)}
                      className={cls(
                        'h-8 px-3 rounded-full text-[12px] font-medium border transition',
                        focusRegions.includes(id)
                          ? 'bg-ultra text-white border-ultra'
                          : 'border-line dark:border-lineDark hover:border-ink/30 text-mute dark:text-muteDark'
                      )}
                    >
                      {label}
                    </button>
                  ))}
                </div>
                <p className="text-[11px] text-mute dark:text-muteDark mt-2">
                  {focusRegions.length === 0 ? 'No focus regions selected — that\'s fine, you can add them later in Settings.' : `${focusRegions.length} selected`}
                </p>
              </div>
            </div>
          </div>
        )}

        {/* Step 2 — Done */}
        {step === 2 && (
          <div className="fade-up text-center py-8">
            <div className="w-20 h-20 mx-auto rounded-full bg-lime/20 text-limeDeep dark:text-lime flex items-center justify-center mb-7">
              <Icon name="check" className="w-10 h-10" stroke={2.5} />
            </div>
            <h1 className="font-display text-[40px] sm:text-[52px] leading-[1] font-semibold tracking-tightest mb-3">
              You're in.
            </h1>
            <p className="text-[15px] text-mute dark:text-muteDark mb-2 max-w-md mx-auto">
              Your workspace is set up. Head to Settings to connect your social accounts — that's where the intelligence starts.
            </p>
            <p className="text-[14px] text-ultra dark:text-lime mb-8">
              Your first brief will generate once accounts are connected.
            </p>
            <Btn variant="ink" size="lg" onClick={onDone}>
              Open dashboard <Icon name="arrowRight" className="w-4 h-4" />
            </Btn>
          </div>
        )}
      </div>

      {/* Footer nav */}
      {step < 2 && (
        <div className="border-t border-line dark:border-lineDark bg-chalk/50 dark:bg-coal/50 backdrop-blur">
          <div className="max-w-2xl mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
            <button
              onClick={() => step > 0 && setStep(s => s - 1)}
              className={cls('text-[14px] font-medium', step === 0 ? 'opacity-30 pointer-events-none' : 'hover:underline')}
            >
              ← Back
            </button>
            <Btn variant="ink" size="md" onClick={handleContinue} disabled={saving}>
              {saving ? 'Saving...' : 'Continue'} <Icon name="arrowRight" className="w-4 h-4" />
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
};

Object.assign(window, { Auth, Onboarding, sbAuth, checkMagicLinkHash, restoreSession });

<script type="text/babel">
// Screen 1 — Morning Brief
// Returns "Good morning", "Good afternoon", "Good evening", "Good night" based
// on the browser's local hour. Cheaper than a per-render Date object — runs
// once per BriefScreen mount + every refreshBrief tick.
const greetingFor = (hour) => {
  if (hour < 5)  return 'Good night';
  if (hour < 12) return 'Good morning';
  if (hour < 17) return 'Good afternoon';
  if (hour < 22) return 'Good evening';
  return 'Good night';
};

const BriefScreen = ({ activePlatform }) => {
  // Use the actual first name when we have one; otherwise just "there".
  // We never want to greet someone by their email prefix.
  const rawName = (D.user.firstName || D.user.name || '').split(' ')[0];
  const looksLikeEmail = rawName.includes('@') || rawName.includes('.');
  const firstName = (!rawName || looksLikeEmail) ? 'there' : rawName;
  const greeting = `${greetingFor(new Date().getHours())}, ${firstName}.`;
  const connected = D.connectedPlatforms || [];
  const isAll = activePlatform === 'all' || !activePlatform;

  // Platform-scoped slices. When a specific tab is active, everything narrows
  // to just that platform's data: posts, signals, ads, follower stat card.
  const scopedPosts   = isAll ? (D.posts   || []) : (D.posts   || []).filter(p => p.platform === activePlatform);
  const scopedSignals = isAll ? (D.signals || []) : (D.signals || []).filter(s => s.platform === activePlatform || s.platform === 'all');
  const signalCount   = scopedSignals.length;
  const sub = signalCount
    ? `${signalCount} signal${signalCount === 1 ? '' : 's'} from your last 30 days${isAll ? '' : ` on ${platformLabel[activePlatform] || activePlatform}`}.`
    : 'Your command center.';

  // Map platforms to display stat cards using real numbers from the hydrated D.
  const PLATFORM_STAT = {
    ig: { label: 'IG followers',    value: D.accounts?.ig?.followers, icon: 'users', color: '#D62976' },
    tt: { label: 'TikTok followers', value: D.accounts?.tt?.followers, icon: 'users', color: '#FF2D6A' },
    yt: { label: 'YT subscribers',  value: D.accounts?.yt?.subs,      icon: 'play',  color: '#FF0000' },
    li: { label: 'LinkedIn',        value: D.accounts?.li?.connections, icon: 'message', color: '#0A66C2' },
    fb: { label: 'Facebook',        value: D.accounts?.fb?.followers, icon: 'users', color: '#1877F2' },
    x:  { label: 'X / Twitter',     value: 0,                          icon: 'users', color: '#0A0A0B' },
  };
  const statCards = isAll
    ? connected.map(p => PLATFORM_STAT[p]).filter(Boolean).slice(0, 4)
    : (PLATFORM_STAT[activePlatform] ? [PLATFORM_STAT[activePlatform]] : []);

  // Real aggregates for the right-side panel (no fake numbers). Scoped to
  // the active tab so individual platform views show that platform's numbers.
  const totalReach = scopedPosts.reduce((s, p) => s + Number(p.views || 0), 0);
  const totalEngActions = scopedPosts.reduce((s, p) =>
    s + Number(p.likes || 0) + Number(p.comments || 0) + Number(p.saves || 0) + Number(p.shares || 0), 0);
  const avgEng = totalReach
    ? Math.round((totalEngActions / totalReach) * 10000) / 100
    : 0;
  // Ads — when scoped to a platform, filter top ads by that platform.
  const ads = D.ads || null;
  const scopedAds = !ads ? null : isAll ? ads : {
    ...ads,
    top: (ads.top || []).filter(a => a.platform === activePlatform),
    count: (ads.top || []).filter(a => a.platform === activePlatform).length,
  };

  return (
    <div className="max-w-[1440px] mx-auto px-4 sm:px-6 py-6 sm:py-10 pb-24 md:pb-10">
      <ScreenHeader
        eyebrow={(() => {
          const v = D.verdict;
          if (!v?.generated_at) return `Today · ${D.lastSync || '—'}`;
          // Render in the workspace's own timezone so the label reads as the
          // user expects ("generated 6:04 AM" matches their wall clock).
          try {
            const tz = v.timezone || 'UTC';
            const dt = new Date(v.generated_at);
            const day = dt.toLocaleDateString('en-US', { timeZone: tz, weekday: 'long', month: 'long', day: 'numeric' });
            const time = dt.toLocaleTimeString('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit' });
            return `Morning Brief · ${day} · generated ${time}`;
          } catch {
            return `Morning Brief · ${new Date(v.generated_at).toLocaleString()}`;
          }
        })()}
        title={greeting}
        sub={sub}
        right={<Pill color="ultra"><PulseDot color="bg-white" size="w-1.5 h-1.5" /> Live</Pill>}
      />

      <div className="grid lg:grid-cols-12 gap-4 sm:gap-5 mb-5 sm:mb-6">
        <div className="lg:col-span-8 rounded-2xl bg-ink text-paper p-6 sm:p-8 relative overflow-hidden fade-up">
          <div className="absolute -right-16 -top-16 w-56 h-56 rounded-full bg-ultra/25 blur-2xl" />
          <div className="absolute -right-10 bottom-0 w-40 h-40 rounded-full bg-magenta/20 blur-2xl" />
          <div className="relative">
            <Pill color="lime" className="!h-5"><Icon name="sparkle" className="w-3 h-3" /> AI Verdict · Live</Pill>
            <h2 className="font-display text-[28px] sm:text-[40px] leading-[1.02] font-semibold tracking-tightest mt-4 mb-3 max-w-2xl">{D.verdict?.title || 'Your first brief is generating.'}</h2>
            <p className="text-[14px] sm:text-[15px] text-paper/70 max-w-xl mb-6 leading-relaxed">{D.verdict?.body || 'PULSE will analyze the last 30 days of activity across your connected accounts and surface the highest-leverage moves. Refresh in ~60 seconds.'}</p>
            {(D.todayActions || []).length > 0 && (
              <div className="grid sm:grid-cols-3 gap-2.5">
                {D.todayActions.map(a => (
                  <div key={a.id} className="rounded-xl bg-paper/10 backdrop-blur p-4 border border-paper/10">
                    <div className="flex items-center justify-between mb-2">
                      <div className="w-7 h-7 rounded-lg bg-lime/15 text-lime flex items-center justify-center"><Icon name={a.icon} className="w-3.5 h-3.5" /></div>
                      <span className="text-[10px] font-mono uppercase tracking-[0.1em] text-paper/50">{a.when}</span>
                    </div>
                    <div className="text-[13px] font-medium mb-1">{a.title}</div>
                    <div className="text-[11.5px] text-paper/60 leading-snug">{a.body}</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>

        {/* Right column — real aggregates from your data, no dead links */}
        <div className="lg:col-span-4 grid grid-cols-2 lg:grid-cols-1 gap-3">
          <Card className="!p-4">
            <Eyebrow>Total reach 30d</Eyebrow>
            <div className="font-display text-[28px] font-semibold tracking-tighter mt-2">{formatNum(totalReach)}</div>
            <div className="text-[11px] text-mute dark:text-muteDark mt-1">{isAll ? 'Across all platforms' : (platformLabel[activePlatform] || activePlatform)}</div>
          </Card>
          <Card className="!p-4">
            <Eyebrow>Avg eng. rate</Eyebrow>
            <div className="font-display text-[28px] font-semibold tracking-tighter mt-2">{avgEng}%</div>
            <div className="text-[11px] text-mute dark:text-muteDark mt-1">Last 30 days</div>
          </Card>
