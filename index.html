    0%   { transform: scale(1); opacity: .8; }

  /* Counter shimmer */
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* Hero gradient blob */

    position: absolute; border-radius: 9999px; filter: blur(80px); pointer-events: none;

  /* Hide scrollbar */
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

  .switch { width: 36px; height: 20px; background: rgba(10,10,11,.15); border-radius: 9999px; position: relative; transition: background .2s; }

  .switch-knob { width: 14px; height: 14px; background: white; border-radius: 9999px; position: absolute; top: 3px; left: 3px; transition: transform .2s; }

<script type="text/babel">
// Pulse UI primitives

const cls = (...a) => a.filter(Boolean).join(' ');

// Card wrapper — bordered, paper
const Card = ({ children, className = '', as: As = 'div', ...rest }) => (
  <As className={cls('card bg-chalk dark:bg-coalsoft border border-line dark:border-lineDark rounded-2xl p-5', className)} {...rest}>
    {children}
  </As>
);

// Primary button
const Btn = ({ children, variant = 'ink', size = 'md', className = '', as: As = 'button', ...rest }) => {
  const sizes = { sm: 'h-9 px-3.5 text-[13px]', md: 'h-11 px-5 text-sm', lg: 'h-12 px-6 text-[15px]' };
  const variants = {
    ink: 'bg-ink text-paper hover:bg-coal dark:bg-paper dark:text-ink dark:hover:bg-chalk',
    lime: 'bg-lime text-ink hover:bg-limeDeep',
    ghost: 'bg-transparent text-ink dark:text-paper hover:bg-ink/5 dark:hover:bg-paper/5',
    outline: 'bg-transparent border border-ink/15 dark:border-paper/15 text-ink dark:text-paper hover:border-ink/40 dark:hover:border-paper/40',
    magenta: 'bg-magenta text-white hover:brightness-110'
  };
  return (
    <As className={cls('inline-flex items-center justify-center gap-2 rounded-full font-medium transition-all', sizes[size], variants[variant], className)} {...rest}>
      {children}
    </As>
  );
};

// Eyebrow label — bold caps, mono
const Eyebrow = ({ children, color = 'text-ultra', className = '' }) => (
  <span className={cls('font-mono text-[10px] uppercase tracking-[0.18em] font-medium', color, className)}>{children}</span>
);

// Platform icon ref
const Plat = ({ p, className = 'w-5 h-5' }) => (
  <svg className={className}><use href={`#ic-${p}`} /></svg>
);

// Sparkline
const Sparkline = ({ data, color = 'currentColor', width = 90, height = 32 }) => {
  if (!data?.length) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline className="spark-line" points={pts} stroke={color} />
    </svg>
  );
};

// Bar sparkline (stat card variant)
const BarSpark = ({ data, color = '#6B5BFF', highlightIdx = -1, height = 28 }) => {
  const max = Math.max(...data) || 1;
  return (
    <div className="flex items-end gap-0.5" style={{ height }}>
      {data.map((v, i) => (
        <div key={i}
          className="flex-1 rounded-sm transition-all"
          style={{ height: `${(v / max) * 100}%`, background: i === highlightIdx ? color : `${color}33`, minHeight: 2 }} />
      ))}
    </div>
  );
};

// Pill badge
const Pill = ({ children, color = 'ink', className = '' }) => {
  const colors = {
    ink: 'bg-ink/8 text-ink dark:bg-paper/10 dark:text-paper',
    lime: 'bg-lime text-ink',
    magenta: 'bg-magenta text-white',
    magentaSoft: 'bg-magentaSoft text-magenta dark:bg-magenta/20 dark:text-magenta',
    ultra: 'bg-ultra text-white',
    ultraSoft: 'bg-ultraSoft text-ultra dark:bg-ultra/20 dark:text-ultra',
    paper: 'bg-paper text-ink dark:bg-paper/10 dark:text-paper',
    amber: 'bg-amber/20 text-amber'
  };
  return <span className={cls('inline-flex items-center gap-1.5 px-2.5 h-6 rounded-full text-[11px] font-medium tracking-tight whitespace-nowrap', colors[color], className)}>{children}</span>;
};

// Pulse live dot
const PulseDot = ({ color = 'bg-magenta', size = 'w-2 h-2' }) => (
  <span className={cls('relative inline-block rounded-full pulse-dot', size, color)} style={{ color: undefined }} />
);

// Progress bar
const Progress = ({ value, max = 100, color = 'bg-ultra', height = 'h-1.5', animate = true }) => {
  const [w, setW] = React.useState(0);
  React.useEffect(() => { const t = setTimeout(() => setW((value / max) * 100), 100); return () => clearTimeout(t); }, [value, max]);
  return (
    <div className={cls('w-full rounded-full bg-ink/8 dark:bg-paper/10 overflow-hidden', height)}>
      <div className={cls('h-full rounded-full transition-all duration-[1200ms] ease-out', color)} style={{ width: `${animate ? w : (value / max) * 100}%` }} />
    </div>
  );
};

// Stat card — label, value, delta, sparkline
const StatCard = ({ label, value, delta, deltaPositive = true, sparkData, color = '#6B5BFF', icon }) => (
  <div className="stat-card card bg-chalk dark:bg-coalsoft border border-line dark:border-lineDark rounded-2xl p-5 hover:border-ink/20 dark:hover:border-paper/20 transition-all">
    <div className="flex items-start justify-between mb-3">
      <div className="flex items-center gap-2">
        {icon && <div className="w-7 h-7 rounded-lg bg-ink/5 dark:bg-paper/5 flex items-center justify-center"><Icon name={icon} className="w-3.5 h-3.5" /></div>}
        <span className="font-mono text-[10px] uppercase tracking-[0.14em] text-mute dark:text-muteDark">{label}</span>
      </div>
      {delta !== undefined && (
        <span className={cls('font-mono text-[11px] flex items-center gap-0.5', deltaPositive ? 'text-emerald-600 dark:text-lime' : 'text-magenta')}>
          {deltaPositive ? '↑' : '↓'} {Math.abs(delta)}%
        </span>
      )}
    </div>
    <div className="font-display text-[34px] leading-none font-semibold tracking-tighter mb-3">{value}</div>
    {sparkData && <BarSpark data={sparkData} color={color} highlightIdx={sparkData.length - 2} />}
  </div>
);

// Section header
const SectionHead = ({ eyebrow, title, sub, right, className = '' }) => (
  <div className={cls('flex flex-col sm:flex-row sm:items-end justify-between gap-3 mb-5', className)}>
    <div>
      {eyebrow && <div className="mb-2"><Eyebrow>{eyebrow}</Eyebrow></div>}
      <h2 className="font-display text-[22px] sm:text-[26px] leading-none font-semibold tracking-tighter">{title}</h2>
      {sub && <p className="text-[13px] text-mute dark:text-muteDark mt-1.5 max-w-md">{sub}</p>}
    </div>
    {right}
  </div>
);

// Logo
const PulseLogo = ({ className = 'h-7' }) => (
  <div className={cls('inline-flex items-center gap-2', className)}>
    <svg viewBox="0 0 32 32" className="h-full w-auto" fill="none">
      <circle cx="16" cy="16" r="14" stroke="currentColor" strokeWidth="1.5" opacity="0.2" />
      <path d="M4 16h6l2-6 4 14 2-8 2 4h8" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
    <span className="font-display text-[20px] font-bold tracking-tightest">Pulse</span>
  </div>
);

Object.assign(window, { cls, Card, Btn, Eyebrow, Plat, Sparkline, BarSpark, Pill, PulseDot, Progress, StatCard, SectionHead, PulseLogo });

</script>

    display:flex;flex-direction:column;box-shadow:-1px 0 0 rgba(0,0,0,.1)}

    filter:drop-shadow(0 1px 1px rgba(0,0,0,.3))}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  signInWithOtp: async (email) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/otp`, {

      headers: sbAuth.headers(),
      body: JSON.stringify({ email, create_user: true, options: { emailRedirectTo: window.location.origin } })
    });

    if (!res.ok) throw new Error(data.error_description || data.msg || 'Could not send link');

  signUp: async (email, password) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',

    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Sign up failed');
    return data;
  },

  // Email + password sign in
  signIn: async (email, password) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: sbAuth.headers(),
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Sign in failed');
    return data; // { access_token, refresh_token, user }
  },

  // Verify OTP token from magic link hash
  verifyOtp: async (token, email) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/verify`, {
      method: 'POST',
      headers: sbAuth.headers(),
      body: JSON.stringify({ type: 'magiclink', token, email })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || 'Verification failed');
    return data;
  },

  // Exchange a refresh_token for a fresh access_token. Supabase access tokens
  // expire after 1 hour; without this, anyone who left the tab open and came
  // back gets logged out.
  refresh: async (refreshToken) => {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: sbAuth.headers(),
      body: JSON.stringify({ refresh_token: refreshToken })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Token refresh failed');
    return data; // { access_token, refresh_token (new), expires_in, user }
  },

  // Get session from localStorage
  getSession: () => {
    try {
      const raw = localStorage.getItem('pulse_session');
      return raw ? JSON.parse(raw) : null;
    } catch { return null; }
  },

  // Save session
  saveSession: (session) => {
    localStorage.setItem('pulse_session', JSON.stringify(session));
    window.__pulseToken = session.access_token;
  },

  // Clear session
  clearSession: () => {
    localStorage.removeItem('pulse_session');
    window.__pulseToken = null;
  }
};

// ── Check for magic link token in URL hash on load ────────────────────────────
const checkMagicLinkHash = async (onAuthed) => {
  const hash = window.location.hash;
  if (!hash.includes('access_token')) return false;

  try {
    const params = new URLSearchParams(hash.replace('#', ''));
    const accessToken  = params.get('access_token');
    const refreshToken = params.get('refresh_token');
    if (!accessToken) return false;

    // Get user from token
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      headers: {
        'apikey':        SUPABASE_ANON,
        'Authorization': `Bearer ${accessToken}`
      }
    });
    const user = await res.json();

    const session = { access_token: accessToken, refresh_token: refreshToken, user };
    sbAuth.saveSession(session);

    // Clean URL
    window.history.replaceState({}, document.title, window.location.pathname);
    onAuthed(session);
    return true;
  } catch (e) {
    console.error('Magic link verification failed:', e);
    return false;
  }
};

// ── Session restore on app load ───────────────────────────────────────────────
// Verifies the saved access_token still works. If it's expired (very likely
// after >1 hour idle), exchanges the refresh_token for a fresh access_token
// before giving up. Only clears the session if the refresh also fails.
const restoreSession = (onAuthed) => {
  const session = sbAuth.getSession();
  if (!session?.access_token) return false;

  window.__pulseToken = session.access_token;

  fetch(`${SUPABASE_URL}/auth/v1/user`, {
    headers: {
      'apikey':        SUPABASE_ANON,
      'Authorization': `Bearer ${session.access_token}`
    }
  }).then(async r => {
    if (r.ok) {
      // Refresh user object too so user.created_at and metadata are current
      const user = await r.json().catch(() => session.user);
      onAuthed({ ...session, user });
      return;
    }
    // Token rejected — try to refresh before clearing.
    if (session.refresh_token) {
      try {
        const refreshed = await sbAuth.refresh(session.refresh_token);
        sbAuth.saveSession(refreshed);
        onAuthed(refreshed);
        return;
      } catch (e) {
        // Refresh failed too — session is genuinely dead.
      }
    }
    sbAuth.clearSession();
  }).catch(async () => {
    // Network error reaching Supabase /user. Don't nuke the session for a
    // transient failure — keep it and let the next call retry. We do still
    // signal "authed" with the cached session so the UI shows the app, not the
    // landing page, during a flaky connection.
    onAuthed(session);
  });

  return true;
};

// Export for use in app.jsx
Object.assign(window, { sbAuth, checkMagicLinkHash, restoreSession });

            <Btn variant="ink" size="lg" onClick={onDone}>
              Open dashboard <Icon name="arrowRight" className="w-4 h-4" />
            </Btn>
          </div>
        )}
      </div>

      {/* Footer nav */}
      {step < 2 && (
        <div className="border-t border-line dark:border-lineDark bg-chalk/50 dark:bg-coal/50 backdrop-blur">
          <div className="max-w-2xl mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
            <button
              onClick={() => step > 0 && setStep(s => s - 1)}
              className={cls('text-[14px] font-medium', step === 0 ? 'opacity-30 pointer-events-none' : 'hover:underline')}
            >
              ← Back
            </button>
            <Btn variant="ink" size="md" onClick={handleContinue} disabled={saving}>
              {saving ? 'Saving...' : 'Continue'} <Icon name="arrowRight" className="w-4 h-4" />
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
};

Object.assign(window, { Auth, Onboarding, sbAuth, checkMagicLinkHash, restoreSession });

</script>
<script type="text/babel">

<script type="text/babel">
// Pulse Settings — clean OAuth connect flow, no API keys shown to users
// All keys held server-side. Users only connect their social accounts.

const API_BASE = window.PULSE_API_URL || '';

// ── API client (calls our backend, which holds keys) ─────────────────────────
const api = async (path, opts = {}) => {
  const token = window.__pulseToken; // set by auth layer
  // Active workspace selector — let the user own multiple workspaces and
  // scope every API call to whichever one is "active" in the UI. Defaults to
  // null (server falls back to oldest workspace).
  const wsId = (() => {
    try { return localStorage.getItem('pulse:workspaceId') || null; } catch { return null; }
  })();
  const res = await fetch(`${API_BASE}/api${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
      ...(wsId ? { 'x-workspace-id': wsId } : {}),
      ...(opts.headers || {})
    }
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
};

// Workspace switcher — sets the active workspace, persists it, and forces a
// hard reload so every screen re-hydrates from /api/brief with the new scope.
window.switchWorkspace = (id) => {
  try {
    if (id) localStorage.setItem('pulse:workspaceId', id);
    else localStorage.removeItem('pulse:workspaceId');
  } catch {}
  window.location.reload();
};

      focus_regions: f.focus_regions?.includes(id)
        ? f.focus_regions.filter(x => x !== id)
        : [...(f.focus_regions || []), id],
    }));

  // Listen for the OAuth success postMessage from /api/connect/callback so we
  // can sync immediately instead of waiting for the next 2s poll. Robust to
  // popup window.close() being blocked or the user closing it manually.
  React.useEffect(() => {
    const onMsg = async (e) => {
      if (e?.data?.type !== 'pulse:connected') return;
      const platform = e.data.platform;
      // Stop any in-flight poll to avoid duplicate sync/toast.
      if (pollerRef.current?.platform === platform) {
        clearInterval(pollerRef.current.poll);
        try { pollerRef.current.popup?.close(); } catch {}
        pollerRef.current = null;
      }
      try {
        const synced = await api('/accounts', { method: 'POST' });
        setAccounts(synced.accounts || []);
        const justConnected = (synced.new_accounts || []).find(a => a.platform === platform);
        const anyConnected = (synced.accounts || []).find(a => a.platform === platform);
        if (justConnected) {
          const label = PLATFORMS.find(p => p.id === platform)?.label || platform;
          showToast(`${label} connected ✓`);
          api('/analytics/refresh', { method: 'POST' }).catch(() => {});
        } else if (!anyConnected) {
          // OAuth round-tripped but Zernio didn't surface the account. Most
          // common cause for Instagram: a personal IG profile (Pulse needs a
          // Business or Creator account). Same for Facebook personal profiles.
          showToast(
            'OAuth completed but no account was returned. ' +
            (platform === 'instagram' || platform === 'facebook'
              ? 'Pulse needs a Business or Creator account — check your account type.'
              : 'Check your account permissions and try again.'),
            'warn'
          );
        }
      } catch (err) { showToast(err.message, 'err'); }
      setConnecting(null);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const showToast = (msg, type = 'ok') => {
    setToast({ msg, type });
    setTimeout(() => setToast(null), 3500);
  };

  // ── Load workspace + accounts on mount ──────────────────────────────────
  React.useEffect(() => {
    const load = async () => {
      try {
        const [wsData, acctData, wsList, comps] = await Promise.all([
          api('/workspaces'),
          api('/accounts'),
          api('/workspaces').catch(() => ({ workspaces: [] })),
          api('/competitors').catch(() => ({ competitors: [] })),
        ]);
        setWorkspace(wsData.workspace);
        setWorkspaces(wsList.workspaces || []);
        setUsage(wsData.usage);
        setAccounts(acctData.accounts || []);
        setCompetitors(comps.competitors || []);
        setForm({
          name:          wsData.workspace.name || '',
          user_type:     wsData.workspace.user_type || 'creator',
          category:      wsData.workspace.category || 'music',
          country:       wsData.workspace.country
                          || ({ ksa:'SA', uae:'AE', pakistan:'PK', canada:'CA', global:'GLOBAL' }[wsData.workspace.market])
                          || 'CA',
          focus_regions: wsData.workspace.focus_regions || [],
          account_age:   wsData.workspace.account_age || '6-12mo',
        });
      } catch (e) {
        // Not yet authenticated — show form with defaults
        setForm({ name: D.workspace, user_type: 'creator', category: 'music', country: 'CA', focus_regions: [], account_age: '6-12mo' });
      } finally {
        setLoading(false);
      }
    };
    load();
  }, []);

  // ── Connect a platform ───────────────────────────────────────────────────
  const connectPlatform = async (platformId) => {
    setConnecting(platformId);
    try {
      const data = await api(`/connect/${platformId}`);
      if (!data.authUrl) throw new Error('No auth URL returned');

      const popup = window.open(
        data.authUrl,
        `connect-${platformId}`,
        'width=620,height=720,left=200,top=80'
      );

      // Poll for successful connection every 2 seconds. The poll is a fallback
      // for when the popup's postMessage didn't reach us (popup blocked,
      // window.close() blocked, user closed manually, etc.).
      let attempts = 0;
      const poll = setInterval(async () => {
        attempts++;
        if (attempts > 60 || popup?.closed) {
          clearInterval(poll);
          // Sync accounts from Zernio to confirm
          try {
            const synced = await api('/accounts', { method: 'POST' });
            setAccounts(synced.accounts || []);
            const connected = synced.accounts?.find(a => a.platform === platformId);
            if (connected) showToast(`${platformId} connected ✓`);
            else if (popup?.closed) showToast('Window closed — try connecting again', 'warn');
          } catch {}
          setConnecting(null);
          return;
        }

        // Check if account appeared
        try {
          const synced = await api('/accounts', { method: 'POST' });
          const connected = (synced.accounts || []).find(a => a.platform === platformId);
          const isNewlyConnected = (synced.new_accounts || []).some(a => a.platform === platformId);
          if (connected) {
            clearInterval(poll);
            popup?.close();
            setAccounts(synced.accounts || []);
            setConnecting(null);
            showToast(`${PLATFORMS.find(p=>p.id===platformId)?.label} connected ✓`);
            // Fire first analytics refresh in the background — your dashboard
            // will populate within ~30s. We don't await; the user can keep working.
            if (isNewlyConnected) {
              api('/analytics/refresh', { method: 'POST' }).catch(() => {});
            }
          }
        } catch {}
      }, 2000);

      // Save the poll handle so the postMessage handler can cancel it on success.
      pollerRef.current = { poll, popup, platform: platformId };

    } catch (e) {
      showToast(e.message, 'err');
      setConnecting(null);
    }
  };

  // ── Disconnect a platform ────────────────────────────────────────────────
  const disconnectPlatform = async (platformId) => {
    const acct = accounts.find(a => a.platform === platformId);
    // Optimistic update
    setAccounts(prev => prev.filter(a => a.platform !== platformId));
    try {
      await api('/accounts', {
        method: 'DELETE',
        body: JSON.stringify(acct?.id ? { id: acct.id } : { platform: platformId }),
      });
      showToast(`${PLATFORMS.find(p=>p.id===platformId)?.label || platformId} disconnected`);
    } catch (e) {
      // Rollback the optimistic update on failure
      if (acct) setAccounts(prev => [...prev, acct]);
      showToast(`Disconnect failed: ${e.message}`, 'err');
    }
  };

  // ── Save workspace settings ───────────────────────────────────────────────
  const saveWorkspace = async () => {
    setSaving(true);
    try {
      await api('/workspaces', {
        method: 'PATCH',
        body: JSON.stringify(form)
      });
      showToast('Workspace settings saved ✓');
    } catch (e) {
      showToast(e.message, 'err');
    } finally {
      setSaving(false);
    }
  };

  // ── Competitors ─────────────────────────────────────────────────────────
  const addCompetitor = async () => {
    const handle = (compForm.handle || '').trim().replace(/^@/, '');
    if (!handle) return;
    setAddingComp(true);
    try {
      const r = await api('/competitors', {
        method: 'POST',
        body: JSON.stringify({ platform: compForm.platform, handle }),
      });
      if (r.competitor) {
        setCompetitors(prev => [r.competitor, ...prev]);
        setCompForm(f => ({ ...f, handle: '' }));
        showToast(`Added @${handle} ✓`);
      }
    } catch (e) {
      showToast(e.message, 'err');
    } finally {
      setAddingComp(false);
    }
  };

  const removeCompetitor = async (id) => {
    const prev = competitors;
    setCompetitors(p => p.filter(c => c.id !== id));
    try {
      await api(`/competitors?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
      showToast('Competitor removed');
    } catch (e) {
      setCompetitors(prev);
      showToast(e.message, 'err');
    }
  };

  // ── Workspaces ──────────────────────────────────────────────────────────
  const createWorkspace = async () => {
    const name = (newWsName || '').trim();
    if (!name) return;
    setCreatingWs(true);
    try {
      const r = await api('/workspaces', {
        method: 'POST',
        body: JSON.stringify({ name }),
      });
      if (r.workspace) {
        setWorkspaces(prev => [...prev, r.workspace]);
        setNewWsName('');
        showToast(`Workspace "${name}" created ✓`);
        // Switch into it — full reload so all screens re-hydrate.
        setTimeout(() => window.switchWorkspace(r.workspace.id), 600);
      }
    } catch (e) {
      showToast(e.message, 'err');
    } finally {
      setCreatingWs(false);
    }
  };

  const connectedMap = React.useMemo(() => {
    const m = {};
    for (const a of accounts) m[a.platform] = a;
    return m;
  }, [accounts]);

  const connectedCount = accounts.length;
  const tier = workspace?.tier || 'creator';
  const tierLabel = { creator: 'Creator', brand: 'Brand', agency: 'Agency' }[tier];

  return (
    <div className="max-w-[1440px] mx-auto px-4 sm:px-6 py-6 sm:py-10 pb-24 md:pb-10">
      <ScreenHeader
        eyebrow="Configuration"
        title="Settings"
        sub="Connect your social accounts and configure your workspace. All credentials are managed securely on our servers."
      />

      {/* Toast */}
      {toast && (
        <div className={cls(
          'fixed top-5 right-5 z-50 px-4 py-3 rounded-xl text-[13px] font-medium shadow-pop fade-up flex items-center gap-2',
          toast.type === 'err' ? 'bg-magenta text-white' :
          toast.type === 'warn' ? 'bg-amber/90 text-ink' :
          'bg-ink text-paper dark:bg-lime dark:text-ink'
        )}>
          <Icon name={toast.type === 'err' ? 'x' : 'check'} className="w-3.5 h-3.5" />
          {toast.msg}
        </div>
      )}

      <div className="grid lg:grid-cols-[1fr_320px] gap-6 sm:gap-8">

        {/* ── LEFT — Platform connections + workspace ── */}
        <div className="space-y-8">

          {/* Platform connections */}
          <div>
            <div className="flex items-center justify-between mb-4">
              <div>
                <h3 className="font-display text-[17px] font-semibold tracking-tight">Connected accounts</h3>
                <p className="text-[13px] text-mute dark:text-muteDark mt-0.5">
                  {connectedCount} of {tier === 'agency' ? '∞' : tier === 'brand' ? '21' : '7'} accounts connected
                </p>
              </div>
              {connectedCount > 0 && (
                <Btn
                  variant="outline"
                  size="sm"
                  onClick={async () => {
                    try {
                      const synced = await api('/accounts', { method: 'POST' });
                      setAccounts(synced.accounts || []);
                      showToast(`Synced ${synced.synced} accounts ✓`);
                    } catch (e) { showToast(e.message, 'err'); }
                  }}
                >
                  <Icon name="refresh" className="w-3.5 h-3.5" /> Sync all
                </Btn>
              )}
            </div>

            <div className="space-y-2.5">
              {PLATFORMS.map(platform => (
                <PlatformCard
                  key={platform.id}
                  platform={platform}
                  account={connectedMap[platform.id]}
                  loading={connecting === platform.id}
                  onConnect={connectPlatform}
                  onDisconnect={disconnectPlatform}
                />
              ))}
            </div>
          </div>

          <div className="h-px bg-line dark:bg-lineDark" />

          {/* Competitors — comparative accounts pulled via Apify (or YouTube
              direct). Nothing is scraped unless the user adds at least one. */}
          <div>
            <div className="flex items-center justify-between mb-1">
              <h3 className="font-display text-[17px] font-semibold tracking-tight">Competitors & comparison accounts</h3>
              <span className="text-[11px] font-mono text-mute dark:text-muteDark">
                {competitors.length} / {tier === 'agency' ? 50 : tier === 'brand' ? 15 : 5}
              </span>
            </div>
            <p className="text-[13px] text-mute dark:text-muteDark mb-4">
              Add public handles you want PULSE to scrape and compare against. Without any entries here, no scrapes run.
            </p>

            <div className="flex flex-col sm:flex-row gap-2 mb-3">
              <select
                value={compForm.platform}
                onChange={e => setCompForm(f => ({ ...f, platform: e.target.value }))}
                className="h-10 px-3 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[13.5px] focus:outline-none focus:border-ultra transition appearance-none sm:w-44"
              >
                <option value="instagram">Instagram</option>
                <option value="tiktok">TikTok</option>
                <option value="youtube">YouTube</option>
                <option value="facebook">Facebook</option>
                <option value="linkedin">LinkedIn</option>
                <option value="x">X / Twitter</option>
              </select>
              <input
                value={compForm.handle}
                onChange={e => setCompForm(f => ({ ...f, handle: e.target.value }))}
                onKeyDown={e => { if (e.key === 'Enter') addCompetitor(); }}
                placeholder="@handle or channel ID"
                className="flex-1 h-10 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[13.5px] focus:outline-none focus:border-ultra transition"
              />
              <Btn variant="ink" onClick={addCompetitor} disabled={addingComp || !compForm.handle.trim()}>
                {addingComp ? 'Adding…' : 'Add'}
              </Btn>
            </div>

            {competitors.length === 0 ? (
              <div className="rounded-xl border border-dashed border-line dark:border-lineDark p-4 text-[12.5px] text-mute dark:text-muteDark">
                No competitors yet. Add one above to start scraping.
              </div>
            ) : (
              <div className="space-y-2">
                {competitors.map(c => (
                  <div key={c.id} className="flex items-center justify-between p-3 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft">
                    <div className="flex items-center gap-3 min-w-0">
                      <Plat p={({ instagram: 'ig', tiktok: 'tt', youtube: 'yt', facebook: 'fb', linkedin: 'li', x: 'x' })[c.platform] || c.platform} className="w-4 h-4 flex-shrink-0" />
                      <div className="min-w-0">
                        <div className="text-[13.5px] font-medium truncate">@{c.handle.replace(/^@/, '')}</div>
                        <div className="text-[11px] text-mute dark:text-muteDark font-mono">
                          {c.platform}{c.followers ? ` · ${formatNum ? formatNum(c.followers) : c.followers} followers` : ''}
                          {c.last_synced_at ? ` · synced ${new Date(c.last_synced_at).toLocaleDateString()}` : ' · not yet synced'}
                        </div>
                      </div>
                    </div>
                    <button
                      onClick={() => removeCompetitor(c.id)}
                      className="text-[11.5px] font-medium text-mute dark:text-muteDark hover:text-magenta transition px-2 py-1"
                    >
                      Remove
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="h-px bg-line dark:bg-lineDark" />

          {/* Workspaces — a user can own multiple workspaces, e.g. one per
              brand or client. Each workspace = its own subscription/quota. */}
          <div>
            <div className="flex items-center justify-between mb-1">
              <h3 className="font-display text-[17px] font-semibold tracking-tight">Your workspaces</h3>
              <span className="text-[11px] font-mono text-mute dark:text-muteDark">
                {workspaces.length} {workspaces.length === 1 ? 'workspace' : 'workspaces'}
              </span>
            </div>
            <p className="text-[13px] text-mute dark:text-muteDark mb-4">
              Each workspace has its own connected accounts, competitors and AI quota — useful if you manage multiple profiles or brands. Each workspace requires its own subscription.
            </p>

            <div className="space-y-2 mb-4">
              {workspaces.map(w => {
                const isActive = workspace && w.id === workspace.id;
                return (
                  <div key={w.id} className={cls(
                    'flex items-center justify-between p-3 rounded-xl border bg-chalk dark:bg-coalsoft transition',
                    isActive ? 'border-lime/50' : 'border-line dark:border-lineDark'
                  )}>
                    <div className="min-w-0">
                      <div className="flex items-center gap-2">
                        <span className="text-[13.5px] font-semibold truncate">{w.name || 'Untitled'}</span>
                        {isActive && (
                          <span className="inline-flex items-center gap-1 px-2 h-5 rounded-full bg-lime/20 text-limeDeep dark:text-lime text-[10px] font-medium">
                            <span className="w-1 h-1 rounded-full bg-limeDeep dark:bg-lime" /> Active
                          </span>
                        )}
                      </div>
                      <div className="text-[11px] text-mute dark:text-muteDark font-mono">
                        {(w.tier || 'creator')} · created {w.created_at ? new Date(w.created_at).toLocaleDateString() : '—'}
                      </div>
                    </div>
                    {!isActive && (
                      <button
                        onClick={() => window.switchWorkspace(w.id)}
                        className="text-[12px] font-medium text-ultra dark:text-lime hover:underline px-2 py-1"
                      >
                        Switch →
                      </button>
                    )}
                  </div>
                );
              })}
            </div>

            <div className="flex flex-col sm:flex-row gap-2">
              <input
                value={newWsName}
                onChange={e => setNewWsName(e.target.value)}
                onKeyDown={e => { if (e.key === 'Enter') createWorkspace(); }}
                placeholder="New workspace name"
                className="flex-1 h-10 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[13.5px] focus:outline-none focus:border-ultra transition"
              />
              <Btn variant="outline" onClick={createWorkspace} disabled={creatingWs || !newWsName.trim()}>
                {creatingWs ? 'Creating…' : 'Add workspace'}
              </Btn>
            </div>
          </div>

          <div className="h-px bg-line dark:bg-lineDark" />

          {/* Workspace settings */}
          <div>
            <h3 className="font-display text-[17px] font-semibold tracking-tight mb-4">Workspace settings</h3>
            <div className="grid sm:grid-cols-2 gap-4">

              <div>
                <label className="block text-[12.5px] font-medium mb-1.5">Workspace name</label>
                <input
                  value={form.name}
                  onChange={e => setForm(f => ({ ...f, name: e.target.value }))}
                  placeholder="My Workspace"
                  className="w-full h-10 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[13.5px] focus:outline-none focus:border-ultra transition"
                />
              </div>

              <div>
                <label className="block text-[12.5px] font-medium mb-1.5">Account type</label>
                <select
                  value={form.user_type}
                  onChange={e => setForm(f => ({ ...f, user_type: e.target.value }))}
                  className="w-full h-10 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[13.5px] focus:outline-none focus:border-ultra transition appearance-none"
                >
                  <option value="creator">Individual Creator</option>
                  <option value="brand">Brand / Business</option>
                  <option value="agency">Agency</option>
                </select>
              </div>

              <div>
                <label className="block text-[12.5px] font-medium mb-1.5">Content category</label>
                <select
                  value={form.category}
                  onChange={e => setForm(f => ({ ...f, category: e.target.value }))}
                  className="w-full h-10 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[13.5px] focus:outline-none focus:border-ultra transition appearance-none"
                >
                  {CATEGORIES.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                </select>
              </div>

              <div>
                <label className="block text-[12.5px] font-medium mb-1.5">Your country</label>
                <select
                  value={form.country}
                  onChange={e => setForm(f => ({ ...f, country: e.target.value }))}
                  className="w-full h-10 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[13.5px] focus:outline-none focus:border-ultra transition appearance-none"
                >
                  {COUNTRIES.map(([v,l]) => <option key={v} value={v}>{l}</option>)}
                </select>
              </div>

              <div>
                <label className="block text-[12.5px] font-medium mb-1.5">How long active on social</label>
                <select
                  value={form.account_age}
                  onChange={e => setForm(f => ({ ...f, account_age: e.target.value }))}
                  className="w-full h-10 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[13.5px] focus:outline-none focus:border-ultra transition appearance-none"
                >
                  <option value="under-6mo">Under 6 months</option>
                  <option value="6-12mo">6 – 12 months</option>
                  <option value="1-3yr">1 – 3 years</option>
                  <option value="3yr+">3+ years</option>
                </select>
              </div>

            </div>

            {/* Focus regions — full-width below the 2-col grid */}
            <div className="mt-4">
              <label className="block text-[12.5px] font-medium mb-1">
                Focus regions <span className="text-[11px] text-mute dark:text-muteDark">— who you want to compare against</span>
              </label>
              <p className="text-[11.5px] text-mute dark:text-muteDark mb-3">
                {form.focus_regions?.length ? `${form.focus_regions.length} selected` : 'None selected. Pick regions or specific countries to track competitors in.'}
              </p>

              <div className="text-[10px] font-mono uppercase tracking-[0.14em] text-mute dark:text-muteDark mb-1.5">Regions</div>
              <div className="flex flex-wrap gap-1.5 mb-3">
                {REGION_PRESETS.map(([id, label]) => (
                  <button
                    key={id}
                    type="button"
                    onClick={() => toggleFocus(id)}
                    className={cls(
                      'h-8 px-3 rounded-full text-[12.5px] font-medium border transition',
                      form.focus_regions?.includes(id)
                        ? 'bg-ink text-paper border-ink dark:bg-paper dark:text-ink dark:border-paper'
                        : 'border-line dark:border-lineDark hover:border-ink/30'
                    )}
                  >
                    {label}
                  </button>
                ))}
              </div>

              <div className="text-[10px] font-mono uppercase tracking-[0.14em] text-mute dark:text-muteDark mb-1.5">Specific countries</div>
              <div className="flex flex-wrap gap-1.5 max-h-36 overflow-y-auto pr-1">
                {COUNTRIES.filter(([id]) => id !== 'GLOBAL').map(([id, label]) => (
                  <button
                    key={id}
                    type="button"
                    onClick={() => toggleFocus(id)}
                    className={cls(
                      'h-8 px-3 rounded-full text-[12px] font-medium border transition',
                      form.focus_regions?.includes(id)
                        ? 'bg-ultra text-white border-ultra'
                        : 'border-line dark:border-lineDark hover:border-ink/30 text-mute dark:text-muteDark'
                    )}
                  >
                    {label}
                  </button>
                ))}
              </div>
            </div>

            <div className="mt-5 flex justify-end">
              <Btn
                onClick={saveWorkspace}
                disabled={saving}
                variant="ink"
              >
                {saving ? 'Saving...' : 'Save settings'}
              </Btn>
            </div>
          </div>
        </div>

        {/* ── RIGHT — Plan + usage ── */}
        <div className="space-y-4">

          {/* Current plan */}
          <div className="rounded-2xl bg-ink text-paper dark:bg-coalsoft p-5 border border-transparent">
            <Eyebrow color="text-lime">Current plan</Eyebrow>
            <div className="font-display text-[28px] font-semibold tracking-tightest mt-2 mb-1">
              {tierLabel}
            </div>
            <p className="text-[12px] text-paper/60 dark:text-muteDark mb-4">
              {tier === 'creator' ? '$29/month · 7 platforms · 5 competitors · 2 hashtags'
               : tier === 'brand' ? '$149/month · 21 accounts · 15 competitors · 10 hashtags'
               : '$599/month · Unlimited · 50 competitors · 30 hashtags'}
            </p>
            {usage && (
              <div className="pt-4 border-t border-paper/10">
                <UsageMeter used={usage.used} limit={usage.limit} tier={tier} />
              </div>
            )}
            {tier !== 'agency' && (
              <button className="mt-4 w-full h-9 rounded-xl bg-lime text-ink text-[13px] font-medium hover:brightness-105 transition">
                Upgrade plan →
              </button>
            )}
          </div>

          {/* Privacy note */}
          <div className="p-3.5 rounded-xl bg-ultraSoft dark:bg-ultra/10 border border-ultra/20 text-[12px] leading-relaxed text-ultra dark:text-ultra/80">
            <Icon name="sparkle" className="w-3.5 h-3.5 inline mr-1" />
            <strong>Your credentials are secure.</strong> API keys are stored on our servers only. You connect your accounts via official OAuth — PULSE never sees your passwords.
          </div>

        </div>
      </div>
    </div>
  );
};

Object.assign(window, { SettingsScreen });

</script>
<script type="text/babel">
// Pulse Live Data — hydrate the global D object from /api/brief
// Strategy: keep the prototype's screens reading from D unchanged; instead,
// fetch real data once and Object.assign it onto D, then bump a remount key.

// Initials from a name/email
const initialsOf = (s) => {
  if (!s) return 'PU';
  const parts = String(s).split(/[ @._-]+/).filter(Boolean);
  return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || 'PU';
};

// Format a "last sync" timestamp into "Today, 06:04" / "2 hrs ago"
const formatSync = (iso) => {
  if (!iso) return '—';
  const then = new Date(iso);
  const now = new Date();
  const mins = Math.floor((now - then) / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return `${mins} min ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs} hr ago`;
  return then.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
};

// Map /api/brief response onto the prototype's D shape.
const hydrateD = (brief) => {
  if (!brief) return;
  const u = brief.user || {};
  const a = brief.accountSummary || {};

  // User block
  D.user = {
    name: u.name || u.email?.split('@')[0] || 'You',
    initials: initialsOf(u.name || u.email),
    handle: u.email?.split('@')[0] || 'pulse',
    location: '',
    plan: brief.tier?.label || 'Creator',
  };

  // Workspace label + list (powers the TopBar switcher).
  D.workspace = brief.workspace?.name || 'Workspace';
  D.workspaces = brief.workspaces || (brief.workspace ? [brief.workspace] : []);
  D.activeWorkspaceId = brief.workspace?.id || null;

  // Sync timings
  D.lastSync = formatSync(brief.lastSync);
  D.nextSync = 'Tomorrow, 06:00';

  // Accounts — preserve any platforms not in the live data (so dark mode tests
  // with partial connections don't crash on D.accounts.ig.followers etc.)
  const empty = (label) => ({ handle: '—', name: label, followers: 0, posts: 0, totalViews4W: 0, engRate4W: 0, avgViews: 0, totalPlays: 0, subs: 0, videos: 0, totalViews: 0, connections: 0 });
  D.accounts = {
    ig: a.ig ? { handle: a.ig.handle, followers: a.ig.followers, posts: a.ig.posts, totalViews4W: a.ig.totalViews4W, engRate4W: a.ig.avgEngRate, avgViews: a.ig.avgViews } : empty('Instagram'),
    tt: a.tt ? { handle: a.tt.handle, followers: a.tt.followers, videos: a.tt.posts, totalPlays: a.tt.totalViews4W } : empty('TikTok'),
    yt: a.yt ? { name: a.yt.handle || a.yt.name, subs: a.yt.followers, videos: a.yt.posts, totalViews: a.yt.totalViews4W } : empty('YouTube'),
    li: a.li ? { name: a.li.handle || a.li.name, connections: a.li.followers, posts: a.li.posts } : empty('LinkedIn'),
    fb: a.fb ? { name: a.fb.handle || a.fb.name, followers: a.fb.followers, posts: a.fb.posts } : empty('Facebook'),
  };

  // Posts, signals, competitors, verdict, actions, intel score
  if (brief.posts?.length) D.posts = brief.posts;
  if (brief.signals?.length) D.signals = brief.signals;
  // Always replace competitors (even empty) so the UI reflects the actual
  // workspace state — the mock seed shouldn't leak through.
  D.competitors = brief.competitors || [];
  if (brief.heatmap?.length) D.heatmap = brief.heatmap;
  if (typeof brief.intelScore === 'number') D.intelScore = brief.intelScore;
  if (brief.todayActions?.length) D.todayActions = brief.todayActions;
  // Expose the AI verdict for the Brief screen's dark hero card
  if (brief.verdict) {
    D.verdict = brief.verdict;
  }
  // Which platforms are actually connected (keys of accountSummary).
  // Used by AccountBar to hide ghost tabs and by Brief's Pipeline status.
  D.connectedPlatforms = Object.keys(a || {});
  // Ad performance summary — null when no ads running.
  D.ads = brief.ads && brief.ads.count > 0 ? brief.ads : null;
};

// Empty-state UI (no accounts connected yet)
const EmptyDashboardCTA = ({ onGoToSettings }) => (
  <div className="max-w-2xl mx-auto px-5 sm:px-8 py-16 sm:py-24 text-center">
    <div className="w-16 h-16 mx-auto rounded-2xl bg-ultra/15 text-ultra flex items-center justify-center mb-6">
      <Icon name="sparkle" className="w-7 h-7" />
    </div>
    <Eyebrow color="text-ultra">Let's start</Eyebrow>
    <h1 className="font-display text-[36px] sm:text-[48px] leading-[1.02] font-semibold tracking-tightest mt-3 mb-3">
      Connect your first account.
    </h1>
    <p className="text-[15px] text-mute dark:text-muteDark max-w-md mx-auto mb-8">
      PULSE generates your daily intelligence brief from your real social data.
      Connect Instagram, TikTok, YouTube, or any other platform to get started.
    </p>
    <Btn variant="ink" size="lg" onClick={onGoToSettings}>
      Go to Settings <Icon name="arrowRight" className="w-4 h-4" />
    </Btn>
  </div>
);

// Loading-state UI (account connected, first brief still generating)
const BriefGenerating = ({ onGoToSettings }) => (
  <div className="max-w-2xl mx-auto px-5 sm:px-8 py-16 sm:py-24 text-center">
    <div className="w-16 h-16 mx-auto rounded-2xl bg-lime/20 text-limeDeep dark:text-lime flex items-center justify-center mb-6">
      <div className="w-7 h-7 border-2 border-current/30 border-t-current rounded-full animate-spin" />
    </div>
    <Eyebrow color="text-lime">Working on it</Eyebrow>
    <h1 className="font-display text-[36px] sm:text-[48px] leading-[1.02] font-semibold tracking-tightest mt-3 mb-3">
      Your first brief is generating.
    </h1>
    <p className="text-[15px] text-mute dark:text-muteDark max-w-md mx-auto mb-8">
      We're pulling the last 30 days from your connected accounts. This usually
      takes 30–60 seconds. Refresh this page in a moment.
    </p>
    <Btn variant="outline" size="md" onClick={onGoToSettings}>
      Connect more accounts
    </Btn>
  </div>
);

Object.assign(window, { hydrateD, EmptyDashboardCTA, BriefGenerating });

</script>
<script type="text/babel">
// Pulse App — root routing + Supabase auth wired

const DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light",
  "density": "comfortable",
  "heroVariant": "gradient",
  "activePlan": "brand",
  "persona": "creator"
}/*EDITMODE-END*/;

function App() {
  const [route, setRoute]               = React.useState('loading');
  const [tab, setTab]                   = React.useState('Brief');
  const [activePlatform, setActivePlatform] = React.useState('all');
  const [range, setRange]               = React.useState('4W');
  const [t, setTweak]                   = useTweaks(DEFAULTS);
  const [showTweaks, setShowTweaks]     = React.useState(false);
  const [session, setSession]           = React.useState(null);
  const [briefData, setBriefData]       = React.useState(null);
  const [dataKey, setDataKey]           = React.useState(0);  // remount trigger

  // Fetch the live brief whenever the user is in the app tab.
  const refreshBrief = React.useCallback(async () => {
    if (!window.__pulseToken) return;
    try {
      const data = await fetch('/api/brief', {
        headers: { 'Authorization': `Bearer ${window.__pulseToken}` }
      }).then(r => r.json());
      if (!data?.error) {
        hydrateD(data);
        setBriefData(data);
        setDataKey(k => k + 1);
      }
    } catch (e) { /* silent — empty state will render */ }
  }, []);

  React.useEffect(() => {
    if (route === 'app') refreshBrief();
  }, [route, refreshBrief]);

  // Refetch when switching to a dashboard tab (catches data that arrived during connect)
  React.useEffect(() => {
    if (route === 'app' && tab !== 'Settings') refreshBrief();
  }, [tab, route, refreshBrief]);

  React.useEffect(() => {
    document.documentElement.classList.toggle('dark', t.theme === 'dark');
  }, [t.theme]);

  React.useEffect(() => {
    document.body.classList.toggle('density-compact', t.density === 'compact');
  }, [t.density]);

  React.useEffect(() => {
    D.user.plan = t.persona === 'agency' ? 'Agency' : t.persona === 'brand' ? 'Brand' : 'Creator';
  }, [t.persona]);

  // Auth init — check magic link hash first, then localStorage.
  // Returning users hitting a magic link should land in the app, not onboarding.
  // The "new user" check (created within last 60s) gates the onboarding route.
  React.useEffect(() => {
    const routeFor = (sess) => {
      const createdAt = sess?.user?.created_at;
      const isNew = createdAt && (Date.now() - new Date(createdAt).getTime()) < 60_000;
      return isNew ? 'onboarding' : 'app';
    };

    const init = async () => {
      if (window.location.hash.includes('access_token')) {
        const handled = await checkMagicLinkHash((sess) => {
          setSession(sess);
          setRoute(routeFor(sess));
        });
        if (handled) return;
      }
      const restored = restoreSession((sess) => {
        setSession(sess);
        setRoute(routeFor(sess));
      });
      if (!restored) setRoute('landing');
    };
    init();
  }, []);

  React.useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleAuthed = (sess) => {
    setSession(sess);
    const isNew = sess?.user?.created_at &&
      (Date.now() - new Date(sess.user.created_at).getTime()) < 60000;
    setRoute(isNew ? 'onboarding' : 'app');
  };

  const handleSignOut = () => {
    sbAuth.clearSession();
    setSession(null);
    setRoute('landing');
  };

  const screens = {
    Brief:    <BriefScreen activePlatform={activePlatform} />,
    Stats:    <OverviewScreen activePlatform={activePlatform} />,
    Growth:   <GrowthScreen />,
    Content:  <ContentScreen />,
    Intel:    <IntelScreen />,
    Targets:  <TargetsScreen />,
    Settings: <SettingsScreen />
  };

  if (route === 'loading') {
    return (
      <div className="min-h-screen bg-paper dark:bg-ink flex items-center justify-center">
        <div className="flex flex-col items-center gap-4">
          <PulseLogo className="h-8 opacity-60" />
          <div className="w-5 h-5 border-2 border-ink/20 dark:border-paper/20 border-t-ink dark:border-t-paper rounded-full animate-spin" />
        </div>
      </div>
    );
  }

  return (
    <>
      <PlatformIcons />

      {route === 'landing' && (
        <Landing
          heroVariant={t.heroVariant}
          activePlan={t.activePlan}
          onSignIn={() => setRoute('signin')}
          onSignUp={() => setRoute('signup')}
        />
      )}

      {(route === 'signin' || route === 'signup') && (
        <Auth
          mode={route}
          onAuthed={handleAuthed}
          onBack={() => setRoute('landing')}
        />
      )}

      {route === 'onboarding' && (
        <Onboarding onDone={() => {
          setTab('Settings');
          setRoute('app');
        }} />
      )}

      {route === 'app' && (
        <div className="min-h-screen bg-paper dark:bg-ink text-ink dark:text-paper">
          <TopBar
            active={tab}
            setActive={setTab}
            theme={t.theme}
            toggleTheme={() => setTweak('theme', t.theme === 'dark' ? 'light' : 'dark')}
            onSignOut={handleSignOut}
            userEmail={session?.user?.email}
          />
          <AccountBar
            activePlatform={activePlatform}
            setActivePlatform={setActivePlatform}
            connectedPlatforms={briefData?.state?.hasAccounts ? Object.keys(briefData.accountSummary || {}) : []}
            onGoConnect={() => setTab('Settings')}
          />
          <div key={`${tab}-${dataKey}`} className="fade-up">
            {(() => {
              // Settings always renders (it's how you connect accounts in the first place)
              if (tab === 'Settings') return screens.Settings;
              // Brief still loading
              if (!briefData) return (
                <div className="max-w-2xl mx-auto px-5 py-24 text-center">
                  <div className="w-8 h-8 mx-auto border-2 border-ink/20 dark:border-paper/20 border-t-ink dark:border-t-paper rounded-full animate-spin" />
                </div>
              );
              // No accounts connected yet
              if (!briefData.state?.hasAccounts) {
                return <EmptyDashboardCTA onGoToSettings={() => setTab('Settings')} />;
              }
              // Accounts connected, first refresh still cooking
              if (!briefData.state?.hasPosts) {
                return <BriefGenerating onGoToSettings={() => setTab('Settings')} />;
              }
              return screens[tab];
            })()}
          </div>
          <MobileNav active={tab} setActive={setTab} />
        </div>
      )}

      {showTweaks && (
        <TweaksPanel title="Tweaks" onClose={() => setShowTweaks(false)}>
          <TweakSection title="Theme">
            <TweakRadio label="Mode" value={t.theme} onChange={v => setTweak('theme', v)}
              options={[{ value: 'light', label: 'Light' }, { value: 'dark', label: 'Dark' }]} />
            <TweakRadio label="Density" value={t.density} onChange={v => setTweak('density', v)}
              options={[{ value: 'comfortable', label: 'Comfortable' }, { value: 'compact', label: 'Compact' }]} />
          </TweakSection>
          <TweakSection title="Landing page">
            <TweakSelect label="Hero variant" value={t.heroVariant} onChange={v => setTweak('heroVariant', v)} options={[
              { value: 'gradient', label: 'Gradient — bold AI feel' },
              { value: 'editorial', label: 'Editorial — restrained' },
              { value: 'split', label: 'Split — product preview right' }
            ]} />
            <TweakSelect label="Featured plan" value={t.activePlan} onChange={v => setTweak('activePlan', v)} options={[
              { value: 'creator', label: 'Creator — $29' },
              { value: 'brand', label: 'Brand — $149' },
              { value: 'agency', label: 'Agency — $599' }
            ]} />
          </TweakSection>
          <TweakSection title="App persona">
            <TweakRadio label="Plan view" value={t.persona} onChange={v => setTweak('persona', v)} options={[
              { value: 'creator', label: 'Creator' },
              { value: 'brand', label: 'Brand' },
              { value: 'agency', label: 'Agency' }
            ]} />
          </TweakSection>
          <TweakSection title="Navigation">
            <TweakButton label="Go to Landing"    onClick={() => setRoute('landing')} />
            <TweakButton label="Go to Sign in"    onClick={() => setRoute('signin')} />
            <TweakButton label="Go to Onboarding" onClick={() => setRoute('onboarding')} />
            <TweakButton label="Go to App"        onClick={() => setRoute('app')} />
          </TweakSection>
        </TweaksPanel>
      )}
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
</body>
</html>
