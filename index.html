  .grain::before {

    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  /* Marquee */
  @keyframes scroll-x {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  /* Mashal dot */

  /* Fade up on mount */

  /* Counter shimmer */

<!-- React + Babel -->
<!-- React dev builds — slower to parse than production but they show full
     error messages in the console when components throw, which has saved
     us multiple times during silent-mount issues.

     Babel must load AFTER React (no async, no defer) — Babel-standalone
     auto-compiles text/babel scripts as soon as it loads, and those
     compiled outputs reference React.createElement. If Babel loads first,
     the compiled scripts fail with "React is not defined" silently. -->
<script crossorigin="anonymous" src="https://unpkg.com/react@18.3.1/umd/react.development.js"
        onload="window.__pulse_loaded_react = true"
        onerror="window.__pulse_failed_react = this.src"></script>
<script crossorigin="anonymous" src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
        onload="window.__pulse_loaded_reactDom = true"
        onerror="window.__pulse_failed_reactDom = this.src"></script>
<script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
        onload="window.__pulse_loaded_babel = true"
        onerror="window.__pulse_failed_babel = this.src"></script>

<style>
  /* Splash overlay — painted by the browser before React/Babel finish
     loading, then dismissed once the SPA has real data. Sits OUTSIDE
     #root so React's mount doesn't touch it; we control its lifecycle
     by toggling `data-ready` on <html>. Background is the same paper /
     ink color as the body so the seam between splash → app is invisible.

     The blur is a backdrop-filter, which means once the app starts
     rendering behind the splash, it dims and softens — the loader feels
     intentional ("Loading your intelligence") rather than accidental
     (blank screen with Babel compiling). */
  #pulse-splash {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(245, 241, 232, 0.85);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    z-index: 9999;
    transition: opacity 320ms cubic-bezier(.22,1,.36,1);
    will-change: opacity;
  }
  html.dark #pulse-splash {
    background: rgba(10, 10, 11, 0.88);
  }
  html[data-ready="1"] #pulse-splash {
    opacity: 0;
    pointer-events: none;
  }
  #pulse-splash-inner {
    display: flex; flex-direction: column; align-items: center; gap: 22px;
    text-align: center;
  }
  #pulse-splash-logo {
    font-family: 'Bricolage Grotesque', system-ui, sans-serif;
    font-size: 32px; font-weight: 700;
    letter-spacing: -0.04em;
    color: #0A0A0B;
  }
  html.dark #pulse-splash-logo { color: #F5F1E8; }
  #pulse-splash-spinner {
    width: 28px; height: 28px;
    border: 2.5px solid rgba(10,10,11,0.12);
    border-top-color: #6B5BFF;
    border-radius: 9999px;
    animation: pulse-splash-spin 0.8s linear infinite;
  }
  html.dark #pulse-splash-spinner {
    border-color: rgba(245,241,232,0.12);
    border-top-color: #6B5BFF;
  }
  #pulse-splash-status {
    font-family: 'Geist Mono', ui-monospace, monospace;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(10,10,11,0.55);
  }
  html.dark #pulse-splash-status { color: rgba(245,241,232,0.55); }
  /* Reset link — appears after 3 seconds so users have a visible escape
     hatch if the loader stalls. Hidden by default; the inline script
     toggles its display after the timeout. */
  #pulse-splash-reset {
    margin-top: 14px;
    font-family: 'Geist', system-ui, sans-serif;
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: #6B5BFF;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    display: none;
    opacity: 0.85;
  }
  #pulse-splash-reset:hover { opacity: 1; }
  @keyframes pulse-splash-spin { to { transform: rotate(360deg); } }
</style>

<body class="grain">
<div id="root"></div>
<div id="pulse-splash" aria-live="polite" aria-busy="true">
  <div id="pulse-splash-inner">
    <div id="pulse-splash-logo">pulse.</div>
    <div id="pulse-splash-spinner"></div>
    <div id="pulse-splash-status">Loading your intelligence</div>
    <button id="pulse-splash-reset" type="button" onclick="try{localStorage.clear();sessionStorage.clear();}catch(e){}location.reload()">Taking too long? Reset session</button>
  </div>
</div>
<script>
  // Apply the saved theme to <html> immediately so the splash matches the
  // user's dark/light preference on first paint (otherwise dark-mode users
  // see a flash of paper-colored splash before the React effect runs).
  (function () {
    try {
      var t = localStorage.getItem('pulse_theme');
      if (t === 'dark') document.documentElement.classList.add('dark');
    } catch (_) {}
  })();

  // Unauthenticated visitors never need the splash — they land on the
  // marketing page, which renders instantly without any data fetches.
  // Dismiss the splash synchronously *before* it paints if there is no
  // cached session and the URL has no magic-link hash to exchange.
  (function () {
    try {
      var hasMagic = window.location.hash && window.location.hash.indexOf('access_token') !== -1;
      var raw = localStorage.getItem('pulse_session');
      var hasSession = false;
      if (raw) {
        try { hasSession = !!(JSON.parse(raw) || {}).access_token; } catch (_) {}
      }
      if (!hasMagic && !hasSession) {
        document.documentElement.setAttribute('data-ready', '1');
      }
    } catch (_) {}
  })();

  // Pre-React fail-safe: if anything goes wrong with React / Babel / the
  // network in a way that prevents the in-app dismiss effect from running,
  // force the splash to dismiss after 6 seconds AND show whatever error
  // info we have collected inside the splash itself so the user isn't
  // staring at a blank screen wondering what happened.
  var __pulse_errors = [];
  window.addEventListener('error', function (e) {
    __pulse_errors.push((e.message || 'error') + (e.filename ? ' (' + e.filename.split('/').pop() + ':' + e.lineno + ')' : ''));
  });
  window.addEventListener('unhandledrejection', function (e) {
    __pulse_errors.push('promise: ' + (e.reason?.message || String(e.reason)));
  });
  // Build the diagnostic panel that takes over the splash when React fails
  // to mount. Errors stay selectable; nothing dismisses on accidental clicks.
  function pulseRenderDiagnostic() {
    var splash = document.getElementById('pulse-splash');
    if (!splash) return;
    // Force splash to stay visible and become interactive even if data-ready
    // got set earlier by some other code path.
    splash.style.opacity = '1';
    splash.style.pointerEvents = 'auto';
    document.documentElement.removeAttribute('data-ready');

    // Build a load-state report so we know which CDN scripts made it.
    var loadState = [
      'React:    ' + (window.React ? '✓ loaded' : (window.__pulse_loaded_react ? '⚠ tag loaded but no global' : (window.__pulse_failed_react ? '✗ failed to load (' + window.__pulse_failed_react + ')' : '— never started'))),
      'ReactDOM: ' + (window.ReactDOM ? '✓ loaded' : (window.__pulse_loaded_reactDom ? '⚠ tag loaded but no global' : (window.__pulse_failed_reactDom ? '✗ failed to load' : '— never started'))),
      'Babel:    ' + (window.Babel ? '✓ loaded' : (window.__pulse_loaded_babel ? '⚠ tag loaded but no global' : (window.__pulse_failed_babel ? '✗ failed to load' : '— never started'))),
      'UA:       ' + (navigator.userAgent || '').slice(0, 90),
    ].join('\n');

    var details = (__pulse_errors.length
      ? __pulse_errors.slice(0, 5).map(function (s) { return s.slice(0, 200); }).join('\n') + '\n\n'
      : '') + 'Load state:\n' + loadState;
    var safeDetails = details.replace(/[<>&]/g, function (c) {
      return { '<': '&lt;', '>': '&gt;', '&': '&amp;' }[c];
    });

    var inner = document.getElementById('pulse-splash-inner');
    if (!inner) return;
    inner.innerHTML =
      '<div id="pulse-splash-logo">Couldn\'t start Mashal</div>' +
      '<pre id="pulse-diag-errors" style="font-family:Geist Mono,ui-monospace,monospace;font-size:11px;color:rgba(10,10,11,0.7);max-width:560px;max-height:200px;overflow:auto;white-space:pre-wrap;word-break:break-word;text-align:left;padding:12px;margin:0;background:rgba(10,10,11,0.04);border-radius:10px;user-select:text;-webkit-user-select:text;">' + safeDetails + '</pre>' +
      '<div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px;">' +
        '<button type="button" id="pulse-diag-copy" style="padding:9px 14px;border-radius:10px;background:#6B5BFF;color:#fff;border:none;font-family:Geist,system-ui,sans-serif;font-size:13px;cursor:pointer;">Copy errors</button>' +
        '<button type="button" id="pulse-diag-reset" style="padding:9px 14px;border-radius:10px;background:#0A0A0B;color:#F5F1E8;border:none;font-family:Geist,system-ui,sans-serif;font-size:13px;cursor:pointer;">Reset & retry</button>' +
      '</div>';

    var copyBtn = document.getElementById('pulse-diag-copy');
    if (copyBtn) {
      copyBtn.addEventListener('click', function () {
        var t = document.getElementById('pulse-diag-errors');
        var txt = t ? t.innerText : details;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(txt).then(function () {
            copyBtn.textContent = 'Copied ✓';
          }).catch(function () {
            copyBtn.textContent = 'Copy failed';
          });
        } else {
          // Fallback for clipboard-API-less environments: select the text.
          var range = document.createRange();
          range.selectNodeContents(t);
          var sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
          copyBtn.textContent = 'Selected — Cmd/Ctrl+C';
        }
      });
    }
    var resetBtn = document.getElementById('pulse-diag-reset');
    if (resetBtn) {
      resetBtn.addEventListener('click', function () {
        try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
        location.reload();
      });
    }
  }
  // Expose for manual recovery from the console too.
  window.__pulseDiagnose = pulseRenderDiagnostic;

  setTimeout(function () {
    var root = document.getElementById('root');
    var mounted = root && root.children.length > 0;
    if (mounted) return;
    pulseRenderDiagnostic();
  }, 6000);

  // Reveal the "Reset session" link on the splash after 3 seconds so the
  // user has a visible escape if React stalls. Hidden during the normal
  // (sub-1-second) loading window so the loader doesn't feel broken.
  setTimeout(function () {
    var btn = document.getElementById('pulse-splash-reset');
    if (btn) btn.style.display = 'inline-block';
  }, 3000);

  // Removed the double-click force-dismiss escape — it conflicted with the
  // user trying to select error text in the diagnostic panel. The Reset
  // button + the 6s pre-React fallback cover the same need without the
  // collision.
</script>

<script type="text/babel">
// Mashal UI primitives

const cls = (...a) => a.filter(Boolean).join(' ');

// Card wrapper — bordered, paper
const Card = ({ children, className = '', as: As = 'div', ...rest }) => (
  <As className={cls('card bg-chalk dark:bg-coalsoft border border-line dark:border-lineDark rounded-2xl p-5', className)} {...rest}>
    {children}
  </As>
);

// Primary button
const Btn = ({ children, variant = 'ink', size = 'md', className = '', as: As = 'button', ...rest }) => {
  const sizes = { sm: 'h-9 px-3.5 text-[13px]', md: 'h-11 px-5 text-sm', lg: 'h-12 px-6 text-[15px]' };
  const variants = {
    ink: 'bg-ink text-paper hover:bg-coal dark:bg-paper dark:text-ink dark:hover:bg-chalk',
    lime: 'bg-lime text-ink hover:bg-limeDeep',
    ghost: 'bg-transparent text-ink dark:text-paper hover:bg-ink/5 dark:hover:bg-paper/5',
    outline: 'bg-transparent border border-ink/15 dark:border-paper/15 text-ink dark:text-paper hover:border-ink/40 dark:hover:border-paper/40',
    magenta: 'bg-magenta text-white hover:brightness-110'
  };
  return (
    <As className={cls('inline-flex items-center justify-center gap-2 rounded-full font-medium transition-all', sizes[size], variants[variant], className)} {...rest}>
      {children}
    </As>
  );
};

// Eyebrow label — bold caps, mono
const Eyebrow = ({ children, color = 'text-ultra', className = '' }) => (
  <span className={cls('font-mono text-[10px] uppercase tracking-[0.18em] font-medium', color, className)}>{children}</span>
);

// Platform icon ref
const Plat = ({ p, className = 'w-5 h-5' }) => (
  <svg className={className}><use href={`#ic-${p}`} /></svg>
);

// Sparkline
const Sparkline = ({ data, color = 'currentColor', width = 90, height = 32 }) => {
  if (!data?.length) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`).join(' ');
  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`}>
      <polyline className="spark-line" points={pts} stroke={color} />
    </svg>
  );
};

// Bar sparkline (stat card variant)
const BarSpark = ({ data, color = '#6B5BFF', highlightIdx = -1, height = 28 }) => {
  const max = Math.max(...data) || 1;
  return (
    <div className="flex items-end gap-0.5" style={{ height }}>
      {data.map((v, i) => (
        <div key={i}
          className="flex-1 rounded-sm transition-all"
          style={{ height: `${(v / max) * 100}%`, background: i === highlightIdx ? color : `${color}33`, minHeight: 2 }} />
      ))}
    </div>
  );
};

// Pill badge
const Pill = ({ children, color = 'ink', className = '' }) => {
  const colors = {
    ink: 'bg-ink/8 text-ink dark:bg-paper/10 dark:text-paper',
    lime: 'bg-lime text-ink',
    magenta: 'bg-magenta text-white',
    magentaSoft: 'bg-magentaSoft text-magenta dark:bg-magenta/20 dark:text-magenta',
    ultra: 'bg-ultra text-white',
    ultraSoft: 'bg-ultraSoft text-ultra dark:bg-ultra/20 dark:text-ultra',
    paper: 'bg-paper text-ink dark:bg-paper/10 dark:text-paper',
    amber: 'bg-amber/20 text-amber'
  };
  return <span className={cls('inline-flex items-center gap-1.5 px-2.5 h-6 rounded-full text-[11px] font-medium tracking-tight whitespace-nowrap', colors[color], className)}>{children}</span>;
};

// Mashal live dot
const MashalDot = ({ color = 'bg-magenta', size = 'w-2 h-2' }) => (
  <span className={cls('relative inline-block rounded-full pulse-dot', size, color)} style={{ color: undefined }} />
);

// Progress bar
const Progress = ({ value, max = 100, color = 'bg-ultra', height = 'h-1.5', animate = true }) => {
  const [w, setW] = React.useState(0);
  React.useEffect(() => { const t = setTimeout(() => setW((value / max) * 100), 100); return () => clearTimeout(t); }, [value, max]);
  return (
    <div className={cls('w-full rounded-full bg-ink/8 dark:bg-paper/10 overflow-hidden', height)}>
      <div className={cls('h-full rounded-full transition-all duration-[1200ms] ease-out', color)} style={{ width: `${animate ? w : (value / max) * 100}%` }} />
    </div>
  );
};

// Stat card — label, value, delta, sparkline
const StatCard = ({ label, value, delta, deltaPositive = true, sparkData, color = '#6B5BFF', icon }) => (
  <div className="stat-card card bg-chalk dark:bg-coalsoft border border-line dark:border-lineDark rounded-2xl p-5 hover:border-ink/20 dark:hover:border-paper/20 transition-all">
    <div className="flex items-start justify-between mb-3">
      <div className="flex items-center gap-2">
        {icon && <div className="w-7 h-7 rounded-lg bg-ink/5 dark:bg-paper/5 flex items-center justify-center"><Icon name={icon} className="w-3.5 h-3.5" /></div>}
        <span className="font-mono text-[10px] uppercase tracking-[0.14em] text-mute dark:text-muteDark">{label}</span>
      </div>
      {delta !== undefined && (
        <span className={cls('font-mono text-[11px] flex items-center gap-0.5', deltaPositive ? 'text-emerald-600 dark:text-lime' : 'text-magenta')}>
          {deltaPositive ? '↑' : '↓'} {Math.abs(delta)}%
        </span>
      )}
    </div>
    <div className="font-display text-[34px] leading-none font-semibold tracking-tighter mb-3">{value}</div>
    {sparkData && <BarSpark data={sparkData} color={color} highlightIdx={sparkData.length - 2} />}
  </div>
);

// Section header
const SectionHead = ({ eyebrow, title, sub, right, className = '' }) => (
  <div className={cls('flex flex-col sm:flex-row sm:items-end justify-between gap-3 mb-5', className)}>
    <div>
      {eyebrow && <div className="mb-2"><Eyebrow>{eyebrow}</Eyebrow></div>}
      <h2 className="font-display text-[22px] sm:text-[26px] leading-none font-semibold tracking-tighter">{title}</h2>
      {sub && <p className="text-[13px] text-mute dark:text-muteDark mt-1.5 max-w-md">{sub}</p>}
    </div>
    {right}
  </div>
);

// Logo
const MashalLogo = ({ className = 'h-7' }) => (
  <div className={cls('inline-flex items-center gap-2', className)}>
    <img src="/images/mashal-logo.png" alt="" className="h-full w-auto" />
    <span className="font-display text-[20px] font-bold tracking-tightest">Mashal</span>
  </div>
);

Object.assign(window, { cls, Card, Btn, Eyebrow, Plat, Sparkline, BarSpark, Pill, MashalDot, Progress, StatCard, SectionHead, MashalLogo });

</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

      return (

    return <span className={cls('text-[13px] leading-snug', featured && 'font-medium')}>{v}</span>;

  // 5fr / 3fr / 3fr / 3fr → label column gets a touch more room.
  const cols = 'grid-cols-[1.6fr_1fr_1fr_1fr]';

  return (
    <div className="mt-10 sm:mt-12">

};

      <div id="compare" className="mt-10 flex justify-center scroll-mt-20">
        <button

          className="inline-flex items-center gap-2 px-5 h-11 rounded-full border border-line dark:border-lineDark bg-chalk/60 dark:bg-coalsoft/60 hover:bg-chalk dark:hover:bg-coalsoft text-[13.5px] font-medium transition"
        >

      {showCompare && <ComparePlans onSignUp={onSignUp} />}

};

<script type="text/babel">
// ── Auth Screen ───────────────────────────────────────────────────────────────
const Auth = ({ mode = 'signin', onAuthed, onBack }) => {
  const [step, setStep]       = React.useState(mode);
  const [email, setEmail]     = React.useState('');
  const [password, setPassword] = React.useState('');
  const [sent, setSent]       = React.useState(false);
  const [error, setError]     = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [usePassword, setUsePassword] = React.useState(false);

  const handleMagicLink = async (e) => {
    e.preventDefault();
    if (!email) return;
    setError('');
    setLoading(true);
    try {
      await sbAuth.signInWithOtp(email);
      setSent(true);
    } catch (err) {
      // Supabase magic-link is rate-limited (default: ~3-4 requests / hour
      // per email). Translate the unfriendly error into something actionable.
      const msg = err.message || '';
      if (/rate limit|too many|429/i.test(msg)) {
        setError('Too many magic-link requests for this email. Wait a few minutes or use email + password instead.');
      } else {
        setError(msg);
      }
    } finally {
      setLoading(false);
    }
  };

  const handlePassword = async (e) => {
    e.preventDefault();
    if (!email || !password) return;
    setError('');
    setLoading(true);
    try {
      let data;
      if (step === 'signup') {
        data = await sbAuth.signUp(email, password);
        // After signup Supabase may require email confirmation
        // If user object is returned directly we can log them in
        if (data.access_token) {
          sbAuth.saveSession(data);
          onAuthed(data);
          return;
        }
        // Otherwise show confirmation message
        setSent(true);
        return;
      } else {
        data = await sbAuth.signIn(email, password);
        sbAuth.saveSession(data);
        // Log the sign-in event. Same dedup key shape as the magic-link
        // path so the user_sign_in_log doesn't double-count if the user
        // happens to re-sign-in within the same token window.
        fetch('/api/auth-log', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${data.access_token}`,
          },
          body: JSON.stringify({ method: 'password', session_id: (data.access_token || '').slice(0, 32) }),
        }).catch(() => {});
        onAuthed(data);
      }
    } catch (err) {
      setError(err.message);
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen bg-paper dark:bg-ink flex flex-col">
      <header className="max-w-7xl w-full mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
        <button onClick={onBack}><MashalLogo /></button>
        <span className="text-[13px] text-mute dark:text-muteDark">
          {step === 'signin' ? 'New here? ' : 'Have an account? '}
          <button
            onClick={() => { setStep(step === 'signin' ? 'signup' : 'signin'); setSent(false); setError(''); }}
            className="text-ink dark:text-paper underline underline-offset-4"
          >
            {step === 'signin' ? 'Create account' : 'Sign in'}
          </button>
        </span>
      </header>

      <div className="flex-1 grid lg:grid-cols-2">
        {/* Left — form */}
        <div className="flex items-center justify-center p-5 sm:p-12">
          <div className="w-full max-w-sm fade-up">
            <Eyebrow color="text-ultra">{step === 'signin' ? 'Welcome back' : 'Start your trial'}</Eyebrow>
            <h1 className="font-display text-[36px] sm:text-[44px] leading-[1] font-semibold tracking-tightest mt-3 mb-2">
              {step === 'signin' ? 'Sign in to Mashal.' : 'Create your account.'}
            </h1>
            <p className="text-[14px] text-mute dark:text-muteDark mb-8">
              {step === 'signin' ? 'Pick up where you left off.' : '7-day free trial. No credit card required.'}
            </p>

            {sent ? (
              /* ── Sent state ── */
              <div className="text-center py-8">
                <div className="w-14 h-14 mx-auto rounded-2xl bg-lime/20 text-limeDeep dark:text-lime flex items-center justify-center mb-5">
                  <Icon name="mail" className="w-6 h-6" />
                </div>
                <h3 className="font-display text-[22px] font-semibold tracking-tighter mb-2">Check your inbox.</h3>
                <p className="text-[14px] text-mute dark:text-muteDark mb-6">
                  We sent a {usePassword ? 'confirmation' : 'magic'} link to{' '}
                  <strong className="text-ink dark:text-paper">{email}</strong>.
                  {usePassword ? ' Confirm your email then sign in.' : ' Click it to sign in — no password needed.'}
                </p>
                <div className="text-[12px] text-mute dark:text-muteDark">
                  Didn't get it?{' '}
                  <button onClick={() => setSent(false)} className="underline">Try again</button>
                </div>
              </div>
            ) : (
              /* ── Form state ── */
              <>
                {/* Error */}
                {error && (
                  <div className="mb-4 px-4 py-3 rounded-xl bg-magenta/10 border border-magenta/20 text-[13px] text-magenta flex items-center gap-2">
                    <Icon name="x" className="w-3.5 h-3.5 flex-shrink-0" />
                    {error}
                  </div>
                )}

                {usePassword ? (
                  /* ── Password form ── */
                  <form onSubmit={handlePassword} className="space-y-3">
                    <div>
                      <label className="block text-[12px] font-medium mb-1.5 text-mute dark:text-muteDark">Email</label>
                      <input
                        type="email" required value={email}
                        onChange={e => setEmail(e.target.value)}
                        placeholder="you@studio.com"
                        className="w-full h-11 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[14px] focus:outline-none focus:border-ultra transition"
                      />
                    </div>
                    <div>
                      <label className="block text-[12px] font-medium mb-1.5 text-mute dark:text-muteDark">Password</label>
                      <input
                        type="password" required value={password}
                        onChange={e => setPassword(e.target.value)}
                        placeholder="8+ characters"
                        className="w-full h-11 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[14px] focus:outline-none focus:border-ultra transition"
                      />
                    </div>
                    <Btn variant="ink" size="md" className="w-full" as="button" type="submit" disabled={loading}>
                      {loading
                        ? <><Icon name="clock" className="w-4 h-4" /> {step === 'signup' ? 'Creating...' : 'Signing in...'}</>
                        : step === 'signup' ? 'Create account' : 'Sign in'
                      }
                    </Btn>
                    <button
                      type="button"
                      onClick={() => { setUsePassword(false); setError(''); }}
                      className="w-full text-[12.5px] text-mute dark:text-muteDark hover:text-ultra transition text-center"
                    >
                      Use magic link instead →
                    </button>
                  </form>
                ) : (
                  /* ── Magic link form ── */
                  <form onSubmit={handleMagicLink} className="space-y-3">
                    <div>
                      <label className="block text-[12px] font-medium mb-1.5 text-mute dark:text-muteDark">Email address</label>
                      <input
                        type="email" required value={email}
                        onChange={e => setEmail(e.target.value)}
                        placeholder="you@studio.com"
                        className="w-full h-11 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[14px] focus:outline-none focus:border-ultra transition"
                      />
                    </div>
                    <Btn variant="ink" size="md" className="w-full" as="button" type="submit" disabled={loading}>
                      {loading
                        ? <><Icon name="clock" className="w-4 h-4" /> Sending link...</>
                        : step === 'signin' ? 'Send sign-in link' : 'Send sign-up link'
                      }
                    </Btn>
                    <div className="flex items-center gap-3 my-1">
                      <div className="flex-1 h-px bg-line dark:bg-lineDark" />
                      <span className="text-[11px] font-mono text-mute dark:text-muteDark">or</span>
                      <div className="flex-1 h-px bg-line dark:bg-lineDark" />
                    </div>
                    <button
                      type="button"
                      onClick={() => { setUsePassword(true); setError(''); }}
                      className="w-full h-11 rounded-xl border border-line dark:border-lineDark hover:border-ink/30 dark:hover:border-paper/30 bg-chalk dark:bg-coalsoft flex items-center justify-center text-[14px] font-medium transition"
                    >
                      Use email + password
                    </button>
                  </form>
                )}

                <p className="text-[11px] text-mute dark:text-muteDark mt-5 leading-relaxed text-center">
                  By continuing you agree to our{' '}
                  <a href="#" className="underline">Terms</a> and{' '}
                  <a href="#" className="underline">Privacy Policy</a>.
                </p>
              </>
            )}
          </div>
        </div>

        {/* Right — visual panel */}
        <div className="hidden lg:flex bg-ink text-paper relative overflow-hidden items-center justify-center p-12">
          <div className="blob bg-ultra" style={{ width: 400, height: 400, top: -100, left: -100, opacity: 0.4 }} />
          <div className="blob bg-magenta" style={{ width: 300, height: 300, bottom: -100, right: -50, opacity: 0.3 }} />
          <div className="relative z-10 max-w-md">
            <MiniBriefPreview />
            <p className="mt-8 text-[14px] text-paper/70 leading-relaxed">
              "Mashal replaced our Monday morning dashboard meeting. The brief is more useful than anything I'd build myself."
              <br />
              <span className="text-paper/50 mt-2 inline-block">— Maya Chen, 240K IG</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  );
};

// ── Onboarding ────────────────────────────────────────────────────────────────
const Onboarding = ({ onDone }) => {
  const [step, setStep]           = React.useState(0);
  const [firstName, setFirstName] = React.useState('');
  const [userType, setUserType]   = React.useState('creator');
  const [category, setCategory]   = React.useState('');
  const [country, setCountry]     = React.useState('CA');
  const [focusRegions, setFocusRegions] = React.useState([]);
  const [accountAge, setAccountAge] = React.useState('6-12mo');
  const [workspaceName, setWorkspaceName] = React.useState('');
  // Tier intent + promo capture for the trial. Defaults to whatever
  // userType was selected in step 0 so the picker arrives pre-filled.
  const [intentTier, setIntentTier] = React.useState('creator');
  const [promoCode, setPromoCode]   = React.useState('');
  const [saving, setSaving]       = React.useState(false);
  const toggleFocus = (id) =>
    setFocusRegions(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);

  // Keep tier intent in sync with userType when the user hasn't manually
  // diverged from it yet (i.e. they're still on the default mapping).
  // Once they pick a different tier on step 2, that becomes sticky.
  const [tierTouched, setTierTouched] = React.useState(false);
  React.useEffect(() => {
    if (!tierTouched) setIntentTier(userType === 'agency' ? 'agency' : userType === 'brand' ? 'brand' : 'creator');
  }, [userType, tierTouched]);

  const steps = ['About you', 'Your market', 'Pick a plan', 'You\'re in'];

  const saveWorkspace = async () => {
    if (!window.__pulseToken) return;
    // Save first name to user_metadata so it's available everywhere we read
    // the user (greetings, future per-user email digests, etc.) — separate
    // from workspace settings which are per-workspace.
    if (firstName.trim()) {
      try {
        await sbAuth.updateUser(window.__pulseToken, {
          data: { first_name: firstName.trim() },
        });
      } catch (e) {
        console.error('Failed to save first name:', e);
      }
    }
    try {
      // Browser IANA timezone — drives the per-workspace cron schedule
      // (6am-local brief, 8/13/18-local live signals, Sunday deep sync).
      // Falls back to UTC if Intl is unavailable for any reason.
      const timezone = (() => {
        try { return Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC'; }
        catch { return 'UTC'; }
      })();
      await fetch('/api/workspaces', {
        method: 'PATCH',
        headers: {
          'Content-Type':  'application/json',
          'Authorization': `Bearer ${window.__pulseToken}`
        },
        body: JSON.stringify({
          name:               workspaceName || 'My Workspace',
          user_type:          userType,
          category:           category || 'other',
          country:            country,
          focus_regions:      focusRegions,
          account_age:        accountAge,
          timezone,
          trial_intent_tier:  intentTier,
          trial_promo_code:   promoCode || null,
        })
      });
    } catch (e) {
      console.error('Failed to save workspace:', e);
    }
  };

  const handleContinue = async () => {
    // Save on the last input step (plan picker) so the workspace lands
    // with tier intent + promo code in one PATCH. Earlier steps just
    // advance — no network calls between question and question.
    if (step === 2) {
      setSaving(true);
      await saveWorkspace();
      setSaving(false);
    }
    setStep(s => s + 1);
  };

  return (
    <div className="min-h-screen bg-paper dark:bg-ink flex flex-col">
      <header className="max-w-3xl w-full mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
        <MashalLogo />
        <span className="text-[12px] font-mono uppercase tracking-[0.14em] text-mute dark:text-muteDark">
          Step {step + 1} of {steps.length}
        </span>
      </header>

      {/* Progress bar */}
      <div className="max-w-3xl w-full mx-auto px-5 sm:px-8 mt-2 mb-8">
        <div className="flex gap-1.5">
          {steps.map((_, i) => (
            <div key={i} className={cls(
              'flex-1 h-1 rounded-full transition-colors',
              i <= step ? 'bg-ink dark:bg-lime' : 'bg-ink/10 dark:bg-paper/10'
            )} />
          ))}
        </div>
      </div>

      <div className="flex-1 max-w-2xl w-full mx-auto px-5 sm:px-8 pb-16">

        {/* Step 0 — About you */}
        {step === 0 && (
          <div className="fade-up">
            <Eyebrow color="text-ultra">Workspace</Eyebrow>
            <h1 className="font-display text-[40px] sm:text-[52px] leading-[1] font-semibold tracking-tightest mt-3 mb-3">
              Tell us about yourself.
            </h1>
            <p className="text-[15px] text-mute dark:text-muteDark mb-8">
              We'll tune your intelligence brief to your situation.
            </p>
            <div className="space-y-6">
              <div>
                <label className="block text-[12px] font-medium mb-1.5 text-mute dark:text-muteDark">Your first name</label>
                <input
                  className="w-full h-11 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[14px] focus:outline-none focus:border-ultra transition"
                  placeholder="What should we call you?"
                  value={firstName}
                  onChange={e => setFirstName(e.target.value)}
                  autoFocus
                />
              </div>
              <div>
                <label className="block text-[12px] font-medium mb-1.5 text-mute dark:text-muteDark">Workspace name</label>
                <input
                  className="w-full h-11 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[14px] focus:outline-none focus:border-ultra transition"
                  placeholder="Your name or brand name"
                  value={workspaceName}
                  onChange={e => setWorkspaceName(e.target.value)}
                />
              </div>
              <div>
                <label className="block text-[12px] font-medium mb-2 text-mute dark:text-muteDark">I am a...</label>
                <div className="flex gap-2">
                  {[
                    { id: 'creator', label: 'Creator', sub: 'Personal brand' },
                    { id: 'brand',   label: 'Brand',   sub: 'Business account' },
                    { id: 'agency',  label: 'Agency',  sub: 'Multiple clients' },
                  ].map(t => (
                    <button
                      key={t.id}
                      onClick={() => setUserType(t.id)}
                      className={cls(
                        'flex-1 p-4 rounded-2xl border text-left transition',
                        userType === t.id
                          ? 'bg-ink text-paper border-ink dark:bg-paper dark:text-ink dark:border-paper'
                          : 'border-line dark:border-lineDark hover:border-ink/30 dark:hover:border-paper/30'
                      )}
                    >
                      <div className="text-[14px] font-semibold">{t.label}</div>
                      <div className={cls('text-[12px] mt-0.5', userType === t.id ? 'text-paper/60 dark:text-ink/60' : 'text-mute dark:text-muteDark')}>{t.sub}</div>
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-[12px] font-medium mb-2 text-mute dark:text-muteDark">Content category</label>
                <div className="flex flex-wrap gap-1.5">
                  {CATEGORIES.filter(([id]) => id !== 'other').map(([id, label]) => (
                    <button
                      key={id}
                      onClick={() => setCategory(id)}
                      className={cls(
                        'h-9 px-3.5 rounded-full text-[13px] font-medium border transition',
                        category === id
                          ? 'bg-ink text-paper border-ink dark:bg-paper dark:text-ink dark:border-paper'
                          : 'border-line dark:border-lineDark hover:border-ink/30'
                      )}
                    >
                      {label}
                    </button>
                  ))}
                </div>
              </div>
              <div>
                <label className="block text-[12px] font-medium mb-2 text-mute dark:text-muteDark">How long have you been active on social?</label>
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
                  {[
                    { id: 'under-6mo', label: 'Under 6 mo' },
                    { id: '6-12mo',    label: '6 – 12 mo' },
                    { id: '1-3yr',     label: '1 – 3 yrs' },
                    { id: '3yr+',      label: '3+ years' },
                  ].map(a => (
                    <button
                      key={a.id}
                      onClick={() => setAccountAge(a.id)}
                      className={cls(
                        'h-10 rounded-xl border text-[13px] font-medium transition',
                        accountAge === a.id
                          ? 'bg-ink text-paper border-ink dark:bg-paper dark:text-ink'
                          : 'border-line dark:border-lineDark hover:border-ink/30'
                      )}
                    >
                      {a.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Step 1 — Country + focus regions */}
        {step === 1 && (
          <div className="fade-up">
            <Eyebrow color="text-ultra">Where</Eyebrow>
            <h1 className="font-display text-[40px] sm:text-[52px] leading-[1] font-semibold tracking-tightest mt-3 mb-3">
              Your country & focus.
            </h1>
            <p className="text-[15px] text-mute dark:text-muteDark mb-8">
              Where you operate, and the regions you want to compare against. We use this to prioritise platforms (e.g. Snapchat for the Gulf, YouTube in Pakistan) and surface competitor signals.
            </p>

            <div className="space-y-6">
              <div>
                <label className="block text-[12px] font-medium mb-1.5 text-mute dark:text-muteDark">Your country</label>
                <select
                  value={country}
                  onChange={e => setCountry(e.target.value)}
                  className="w-full h-11 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[14px] focus:outline-none focus:border-ultra transition appearance-none"
                >
                  {COUNTRIES.map(([id, label]) => (
                    <option key={id} value={id}>{label}</option>
                  ))}
                </select>
              </div>

              <div>
                <label className="block text-[12px] font-medium mb-2 text-mute dark:text-muteDark">
                  Focus regions <span className="text-[11px] text-mute dark:text-muteDark">— who you want to compare against</span>
                </label>

                <div className="text-[10px] font-mono uppercase tracking-[0.14em] text-mute dark:text-muteDark mb-1.5">Regions</div>
                <div className="flex flex-wrap gap-1.5 mb-4">
                  {REGION_PRESETS.map(([id, label]) => (
                    <button
                      key={id}
                      onClick={() => toggleFocus(id)}
                      className={cls(
                        'h-8 px-3 rounded-full text-[12.5px] font-medium border transition',
                        focusRegions.includes(id)
                          ? 'bg-ink text-paper border-ink dark:bg-paper dark:text-ink dark:border-paper'
                          : 'border-line dark:border-lineDark hover:border-ink/30'
                      )}
                    >
                      {label}
                    </button>
                  ))}
                </div>

                <div className="text-[10px] font-mono uppercase tracking-[0.14em] text-mute dark:text-muteDark mb-1.5">Specific countries</div>
                <div className="flex flex-wrap gap-1.5 max-h-40 overflow-y-auto pr-1">
                  {COUNTRIES.filter(([id]) => id !== 'GLOBAL').map(([id, label]) => (
                    <button
                      key={id}
                      onClick={() => toggleFocus(id)}
                      className={cls(
                        'h-8 px-3 rounded-full text-[12px] font-medium border transition',
                        focusRegions.includes(id)
                          ? 'bg-ultra text-white border-ultra'
                          : 'border-line dark:border-lineDark hover:border-ink/30 text-mute dark:text-muteDark'
                      )}
                    >
                      {label}
                    </button>
                  ))}
                </div>
                <p className="text-[11px] text-mute dark:text-muteDark mt-2">
                  {focusRegions.length === 0 ? 'No focus regions selected — that\'s fine, you can add them later in Settings.' : `${focusRegions.length} selected`}
                </p>
              </div>
            </div>
          </div>
        )}

        {/* Step 2 — Tier intent + promo code (trial pre-pick) */}
        {step === 2 && (
          <div className="fade-up">
            <Eyebrow color="text-ultra">Your plan</Eyebrow>
            <h1 className="font-display text-[40px] sm:text-[52px] leading-[1] font-semibold tracking-tightest mt-3 mb-3">
              Pick where you're headed.
            </h1>
            <p className="text-[15px] text-mute dark:text-muteDark mb-8">
              Your 7-day trial gives you everything Mashal collects. Tell us what you're planning to upgrade to — we'll tune your brief and the locked-feature copy to match.
            </p>

            <div className="grid sm:grid-cols-3 gap-2.5 mb-7">
              {[
                { id: 'creator', label: 'Creator', price: '$15/mo', sub: '5 accounts · 5 competitors · weekly brief' },
                { id: 'brand',   label: 'Brand',   price: '$99/mo', sub: '7 accounts · 10 competitors · daily brief + ads' },
                { id: 'agency',  label: 'Agency',  price: '$449/mo', sub: '~100 accounts · 30 competitors · white-label + ads' },
              ].map(t => (
                <button
                  key={t.id}
                  onClick={() => { setIntentTier(t.id); setTierTouched(true); }}
                  className={cls(
                    'p-4 rounded-2xl border text-left transition relative',
                    intentTier === t.id
                      ? 'bg-ink text-paper border-ink dark:bg-paper dark:text-ink dark:border-paper'
                      : 'border-line dark:border-lineDark hover:border-ink/30 dark:hover:border-paper/30'
                  )}
                >
                  {t.id === 'brand' && (
                    <span className={cls(
                      'absolute -top-2 right-3 inline-flex items-center px-2 h-5 rounded-full text-[9.5px] font-mono uppercase tracking-[0.12em] font-medium',
                      intentTier === t.id ? 'bg-lime text-ink' : 'bg-lime text-ink'
                    )}>Popular</span>
                  )}
                  <div className="text-[14px] font-semibold">{t.label}</div>
                  <div className={cls('text-[15px] font-mono mt-0.5', intentTier === t.id ? '' : 'text-mute dark:text-muteDark')}>{t.price}</div>
                  <div className={cls('text-[11.5px] mt-2 leading-snug', intentTier === t.id ? 'text-paper/70 dark:text-ink/70' : 'text-mute dark:text-muteDark')}>{t.sub}</div>
                </button>
              ))}
            </div>

            <div>
              <label className="block text-[12px] font-medium mb-1.5 text-mute dark:text-muteDark">
                Promo code <span className="text-[11px] text-mute dark:text-muteDark">— optional</span>
              </label>
              <input
                type="text"
                value={promoCode}
                onChange={e => setPromoCode(e.target.value.toUpperCase())}
                className="w-full h-11 px-3.5 rounded-xl border border-line dark:border-lineDark bg-chalk dark:bg-coalsoft text-[14px] font-mono tracking-[0.05em] focus:outline-none focus:border-ultra transition"
                placeholder="BETA50"
                maxLength={32}
              />
              <p className="text-[11.5px] text-mute dark:text-muteDark mt-1.5">
                We'll apply this at checkout when you upgrade. Trial features stay the same regardless.
              </p>
            </div>

            <div className="mt-7 rounded-2xl bg-chalk/60 dark:bg-coalsoft/60 p-4 text-[12.5px] text-mute dark:text-muteDark leading-relaxed">
              <div className="flex items-start gap-2.5">
                <Icon name="clock" className="w-4 h-4 mt-0.5 text-ultra dark:text-lime flex-shrink-0" />
                <div>
                  <div className="font-semibold text-ink dark:text-paper mb-0.5">During the 7-day trial</div>
                  1 workspace · 2 social accounts · 2 competitors · scrape-only data · last 10 posts per account on first fetch. Upgrade any time to unlock the full {intentTier.charAt(0).toUpperCase() + intentTier.slice(1)} tier.
                </div>
              </div>
            </div>
          </div>
        )}

        {/* Step 3 — Done */}
        {step === 3 && (
          <div className="fade-up text-center py-8">
            <div className="w-20 h-20 mx-auto rounded-full bg-lime/20 text-limeDeep dark:text-lime flex items-center justify-center mb-7">
              <Icon name="check" className="w-10 h-10" stroke={2.5} />
            </div>
            <h1 className="font-display text-[40px] sm:text-[52px] leading-[1] font-semibold tracking-tightest mb-3">
              You're in.
            </h1>
            <p className="text-[15px] text-mute dark:text-muteDark mb-2 max-w-md mx-auto">
              Your workspace is set up. Head to Settings to connect your social accounts — that's where the intelligence starts.
            </p>
            <p className="text-[14px] text-ultra dark:text-lime mb-8">
              Your first brief will generate once accounts are connected.
            </p>
            <Btn variant="ink" size="lg" onClick={onDone}>
              Open dashboard <Icon name="arrowRight" className="w-4 h-4" />
            </Btn>
          </div>
        )}
      </div>

      {/* Footer nav */}
      {step < 3 && (
        <div className="border-t border-line dark:border-lineDark bg-chalk/50 dark:bg-coal/50 backdrop-blur">
          <div className="max-w-2xl mx-auto px-5 sm:px-8 h-16 flex items-center justify-between">
            <button
              onClick={() => step > 0 && setStep(s => s - 1)}
              className={cls('text-[14px] font-medium', step === 0 ? 'opacity-30 pointer-events-none' : 'hover:underline')}
            >
              ← Back
            </button>
            <Btn variant="ink" size="md" onClick={handleContinue} disabled={saving}>
              {saving ? 'Saving...' : 'Continue'} <Icon name="arrowRight" className="w-4 h-4" />
            </Btn>
          </div>
        </div>
      )}
    </div>
  );
};

Object.assign(window, { Auth, Onboarding, sbAuth, checkMagicLinkHash, restoreSession });
